name: 로또 데이터 자동 갱신

on:
  schedule:
    - cron: '30 12 * * 6'  # 매주 토요일 21:30 KST (UTC+9)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 데이터 수집
        run: python collect_lotto_final.py

      - name: 판매점 데이터 수집
        run: python collect_stores.py

      - name: 위젯 재생성
        run: python generate_widget.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto_data.json lotto_data.js stores.json widget-01.html
          git diff --staged --quiet || git commit -m "자동 갱신: $(date '+%Y-%m-%d')"
          git push
