<style>
  * { box-sizing: border-box; }
  :root {

    --good:#17803d; --good-bg:#e8f7ee; --warn:#b45309; --warn-bg:#fff4df;

  }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;
    line-height:1.5;
  }
  .wrap { width:min(1180px,calc(100% - 28px)); margin:0 auto; }
  header {

  .head { padding:18px 0 14px; display:flex; justify-content:space-between; gap:18px; align-items:center; flex-wrap:wrap; }
  h1 { margin:0; font-size:24px; }
  .sub { margin:3px 0 0; color:var(--muted); font-size:13px; }
  .controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .ctrl {
    display:flex; gap:6px; align-items:center; background:var(--soft);
    border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:13px; font-weight:800;
  }
  .ctrl input { width:140px; border:0; background:transparent; font:inherit; padding:0; }
  .btn {
    border:1px solid var(--line); background:#fff; border-radius:8px; padding:8px 12px;
    font:inherit; font-weight:800; cursor:pointer; color:var(--ink);
  }
  .btn:hover { background:var(--soft); }
  .btn.primary { background:var(--dark); color:#fff; border-color:var(--dark); }
  main { padding:16px 0 42px; }
  .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
  .summary-card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:13px; }
  .summary-card b { display:block; font-size:22px; line-height:1.1; }
  .summary-card .lead-badge { display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:26px; padding:0 7px; border-radius:7px; color:#fff; font-size:13px; font-weight:900; border:1px solid rgba(0,0,0,.12); margin-right:7px; vertical-align:middle; }
  .summary-card .lead-name { font-size:15px; font-weight:900; color:var(--ink); vertical-align:middle; }
  .summary-card span { color:var(--muted); font-size:12px; font-weight:800; }
  .layout { display:grid; grid-template-columns:330px 1fr; gap:12px; align-items:start; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .panel-head { padding:13px 14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; align-items:center; }
  .panel-title { margin:0; font-size:16px; }
  .hint { color:var(--muted); font-size:12px; font-weight:700; }
  .rank-list { padding:8px; }
  .div-label { font-size:11px; font-weight:900; color:var(--muted); padding:8px 9px 3px; }
  .reco-btn { width:calc(100% - 16px); margin:8px; font-size:15px; padding:12px; }
  .reco-head { padding:4px 4px 12px; }
  .reco-head h2 { margin:0; font-size:20px; }
  .reco-head p { margin:4px 0 0; color:var(--muted); font-size:13px; }
  .reco-card { border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px; background:#fff; }
  .reco-top { display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .reco-pick { display:flex; align-items:center; gap:10px; }
  .reco-pick b { font-size:16px; display:block; }
  .reco-sub { color:var(--muted); font-size:12px; }
  .reco-conf { text-align:right; }
  .reco-pct { color:var(--muted); font-size:12px; font-weight:900; margin-top:3px; }
  .reco-reasons { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .reco-reason { background:var(--soft); border:1px solid var(--line); border-radius:6px; padding:4px 8px; font-size:12px; font-weight:700; }
  .odds-in { width:110px; margin:6px 0; padding:7px 9px; border:1px solid var(--line); border-radius:7px; font:inherit; font-size:15px; font-weight:900; }
  .odds-result { margin-top:6px; font-size:13px; font-weight:800; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .odds-meta { color:var(--muted); font-size:12px; font-weight:700; }
  .reco-reason.bad-signal { background:var(--bad-bg); border-color:#f3b4b4; color:var(--bad); }
  .reco-reason.good-signal { background:var(--good-bg); border-color:#b9e4c7; color:var(--good); }
  .reco-reason.key { background:#e7f0ff; border-color:#9dc0f5; color:#1d4ed8; font-weight:900; }
  .reco-reason.key-away { background:#fff0e0; border-color:#f7b87a; color:#ea580c; font-weight:900; }
  .reco-reason.hint { background:#f5f5f0; border-color:#c8c8b8; color:#6b6b55; font-weight:700; }
  .reco-card.reco-star { border:2px solid var(--good); background:var(--good-bg); }
  .reco-card.reco-weak { border-style:dashed; background:#fbfcfe; }
  .reco-card.reco-weak .reco-pick b { color:var(--muted); }
  .miss-panel { margin-top:10px; padding:10px; border:1px dashed var(--line); border-radius:8px; background:#fbfcfe; text-align:left; font-size:12px; color:var(--ink); }
  .miss-title { font-weight:900; margin-bottom:6px; }
  .miss-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
  .miss-panel ul { margin:6px 0; padding-left:18px; }
  .miss-panel li { margin:3px 0; }
  .miss-panel p { margin:6px 0 0; font-weight:800; }
  @keyframes highlightPulse { 0%{box-shadow:0 0 0 0 rgba(37,99,235,0.5)} 50%{box-shadow:0 0 0 6px rgba(37,99,235,0.25)} 100%{box-shadow:0 0 0 0 rgba(37,99,235,0)} }
  .card-highlight { outline:2px solid #2563eb !important; animation:highlightPulse 0.6s ease 2; }
  .league-tabs { display:flex; gap:6px; padding:8px 8px 0; }
  .lg-tab { flex:1; border:1px solid var(--line); background:#fff; border-radius:8px; padding:8px; font:inherit; font-weight:900; font-size:13px; cursor:pointer; color:var(--muted); }
  .lg-tab.active { background:var(--dark); color:#fff; border-color:var(--dark); }
  .team-row {
    display:grid; grid-template-columns:30px 1fr auto; gap:9px; align-items:center;
    padding:9px; border-radius:8px; cursor:pointer; border:1px solid transparent;
  }
  .team-row:hover, .team-row.active { background:var(--info-bg); border-color:#bad0ff; }
  .rank-no { color:var(--muted); font-size:12px; font-weight:900; text-align:center; }
  .team-main { min-width:0; }
  .team-name { font-weight:900; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .team-meta { color:var(--muted); font-size:12px; }
  .badge { display:inline-flex; align-items:center; justify-content:center; border-radius:999px; padding:4px 8px; font-size:12px; font-weight:900; white-space:nowrap; }
  .good { color:var(--good); background:var(--good-bg); }
  .warn { color:var(--warn); background:var(--warn-bg); }
  .bad { color:var(--bad); background:var(--bad-bg); }
  .danger { color:#fff; background:#7f1d1d; }
  .info { color:var(--info); background:var(--info-bg); }
  .slate { color:var(--dark); background:var(--soft); }
  .team-badge { display:inline-flex; align-items:center; justify-content:center; width:48px; height:34px; border-radius:8px; color:#fff; font-weight:900; font-size:13px; border:1px solid rgba(0,0,0,.12); flex:none; }
  .tabs { display:flex; gap:6px; padding:8px; border-bottom:1px solid var(--line); background:#fbfcfe; flex-wrap:wrap; }
  .tab { flex:1; min-width:90px; border:1px solid var(--line); background:#fff; border-radius:8px; padding:9px 8px; font:inherit; font-weight:900; cursor:pointer; color:var(--muted); }
  .tab.active { background:var(--dark); color:#fff; border-color:var(--dark); }
  .view { display:none; }
  .view.active { display:block; }
  .hero-card { padding:16px; }
  .team-top { display:flex; justify-content:space-between; gap:14px; align-items:center; margin-bottom:14px; }
  .team-title { display:flex; gap:10px; align-items:center; min-width:0; }
  .team-title h2 { margin:0; font-size:22px; line-height:1.15; }
  .team-title p { margin:3px 0 0; color:var(--muted); font-size:13px; }
  .signal-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .signal { border:1px solid var(--line); border-radius:8px; padding:10px; min-height:84px; background:#fff; }
  .signal .label { color:var(--muted); font-size:11px; font-weight:900; margin-bottom:4px; }
  .signal .value { font-size:20px; font-weight:900; }
  .signal .desc { color:var(--muted); font-size:12px; margin-top:2px; }
  .bar { height:8px; background:var(--soft); border-radius:999px; overflow:hidden; margin-top:7px; }
  .bar > div { height:100%; border-radius:999px; }
  .section { padding:14px; border-top:1px solid var(--line); }
  .section h3 { margin:0 0 10px; font-size:15px; }
  .mini-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .mini { border:1px solid var(--line); border-radius:8px; padding:10px; background:#fff; }
  .mini b { display:block; font-size:16px; }
  .mini span { color:var(--muted); font-size:12px; }
  .content-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .game-list { display:grid; gap:10px; }
  .game-card { border:1px solid var(--line); border-radius:8px; background:#fff; overflow:hidden; }
  .game-head { padding:12px; display:flex; justify-content:space-between; gap:12px; align-items:center; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .match { display:flex; align-items:center; gap:8px; font-weight:900; }
  .vs { color:var(--muted); font-size:12px; font-weight:900; }
  .game-time { color:var(--muted); font-size:12px; font-weight:800; }
  .game-body { padding:12px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .compare-team { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fff; }
  .compare-team .name { font-weight:900; margin-bottom:8px; display:flex; align-items:center; gap:8px; }

  .pitcher-line { min-width:0; text-align:left; }
  .pick-box { border-left:1px solid var(--line); padding-left:10px; display:flex; flex-direction:column; gap:6px; justify-content:center; }

  .player-detail { border:1px solid var(--line); border-radius:8px; background:#fbfcfe; padding:12px; margin-bottom:10px; }
  .player-detail-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:10px; }

  .player-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .player-stat { border:1px solid var(--line); border-radius:8px; background:#fff; padding:9px; }
  .player-stat span { display:block; color:var(--muted); font-size:11px; font-weight:900; }
  .player-stat b { display:block; font-size:17px; margin-top:2px; }
  .player-stat small { display:block; color:var(--info); font-size:11px; font-weight:900; margin-top:2px; }
  .split-note { margin-top:8px; font-size:12px; color:var(--muted); }
  .gsplit { margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); }
  .gsplit table.roster { font-size:12px; }
  .gsplit th, .gsplit td { padding:4px 6px; }
  .footer-note { margin:12px 14px 14px; padding:12px; background:var(--soft); border:1px solid var(--line); border-radius:8px; color:var(--muted); font-size:12px; }
  .state { padding:40px 16px; text-align:center; color:var(--muted); font-weight:800; }
  .state.err { color:var(--bad); }
  @media (max-width: 980px) {
    .layout { grid-template-columns:1fr; }
    .rank-list { max-height:none; }
    .content-grid { grid-template-columns:1fr; }
  }
  @media (max-width: 680px) {
    .summary { grid-template-columns:repeat(2,1fr); }
    .signal-grid, .game-body { grid-template-columns:1fr; }

    .pick-box { border-left:0; border-top:1px solid var(--line); padding-left:0; padding-top:10px; }
  }
</style>

<header>
  <div class="wrap head">

      <h1>MLB 베트맨 분석 대시보드</h1>

function rosterEraTier(era, ip){

function streakKo(s){
  if(!s) return "–";

// 등급/정렬 기준 = 상대 수준 보정 승률(adjWin). 약한 지구에서 부풀린/억울하게 깎인 승률 보정.
// 보정 데이터(경기 로그) 아직 없으면 생승률로 폴백.
function teamScore(t){ return (t&&t.id!=null ? (adjWin(t.id) ?? t.win) : t.win); }
let LG={mean:.5,std:.06}; // 리그 분포(reload에서 갱신)
function computeLeague(){
  const xs=ranked.map(teamScore); const n=xs.length||1;
  const mean=xs.reduce((a,b)=>a+b,0)/n;
  const std=Math.sqrt(xs.reduce((a,b)=>a+(b-mean)**2,0)/n)||.0001;
  LG={mean,std};
}
// 절대 가드레일 + 상대평가(리그 평균 ±0.5σ) 혼합
function teamGrade(t){
  const s=teamScore(t);
  if(s>=.600) return {cls:"good",label:"강팀"};
  if(s<=.400) return {cls:"bad",label:"약팀"};
  if(s>=LG.mean+0.5*LG.std) return {cls:"good",label:"강팀"};
  if(s<=LG.mean-0.5*LG.std) return {cls:"bad",label:"약팀"};
  return {cls:"warn",label:"보통"};
}

async function loadBetmanOdds(){
  try {
    const d = await fetch("betman_odds.json");
    if(!d.ok) return;
    const json = await d.json();
    betmanOdds = {...(window.BETMAN_ODDS||{})};
    for(const g of (json.games||[])){
      const hId = BETMAN_NAME_MAP[g.home];
      const aId = BETMAN_NAME_MAP[g.away];
      if(hId && aId){
        const key=`${hId}_${aId}`;
        const prev=betmanOdds[key]||{};
        betmanOdds[key] = {
          home: g.home_odds ?? prev.home,
          away: g.away_odds ?? prev.away,
          ou_line: g.ou_line ?? prev.ou_line,
          under: g.under ?? prev.under,
          over: g.over ?? prev.over
        };
      }
    }
  } catch(e) {}
}

function splitPct(rec,type){
  const s=(rec.records?.splitRecords||[]).find(x=>x.type===type);
  if(!s) return null;
  const g=s.wins+s.losses;
  return g? s.wins/g : null;
}

async function loadStandings(season){
  const d=await getJSON(`${API}/standings?leagueId=103,104&season=${season}&standingsTypes=regularSeason`);
  const out={};
  (d.records||[]).forEach(div=>{
    (div.teamRecords||[]).forEach(r=>{
      const id=r.team.id;
      out[id]={
        id, win:parseFloat(r.winningPercentage)||0, wins:r.wins, losses:r.losses,
        home:splitPct(r,"home"), away:splitPct(r,"away"), last10:splitPct(r,"lastTen"),
        rs:r.runsScored, ra:r.runsAllowed, divRank:r.divisionRank,
        div:(div.division&&div.division.id)||0, streak:r.streak?r.streak.streakCode:"",
      };
    });
  });
  return out;
}

async function loadBatting(season){
  try{
    const d=await getJSON(`${API}/teams/stats?stats=season&group=hitting&season=${season}&sportId=1`);
    const splits=(d.stats&&d.stats[0]&&d.stats[0].splits)||[];
    splits.forEach(s=>{
      const t=standings[s.team.id]; if(!t) return;
      const st=s.stat;
      t.obp=parseFloat(st.obp)||null;
      t.slg=parseFloat(st.slg)||null;
      const bb=st.baseOnBalls, k=st.strikeOuts;
      t.bbk=(bb!=null&&k)?bb/k:null;
    });
  }catch(e){ /* 타선 스탯 없으면 결합 신호만 비활성 */ }
}

async function loadGames(date){
  const d=await getJSON(`${API}/schedule?sportId=1&date=${date}&hydrate=probablePitcher,team`);
  const list=(d.dates&&d.dates[0])?d.dates[0].games:[];
  const out=list.map(g=>({
    id:g.gamePk, time:g.gameDate, status:g.status.detailedState,
    away:g.teams.away.team.id, home:g.teams.home.team.id,
    aScore:g.teams.away.score, hScore:g.teams.home.score,
    awayP:g.teams.away.probablePitcher||null, homeP:g.teams.home.probablePitcher||null,
    odds:{} // 사용자 입력 배당 저장
  }));
  // 선발투수 ERA 일괄 조회
  const ids=[...new Set(out.flatMap(g=>[g.awayP,g.homeP]).filter(Boolean).map(p=>p.id))];
  if(ids.length){
    try{
      const pd=await getJSON(`${API}/people?personIds=${ids.join(",")}&hydrate=stats(group=[pitching],type=[season,gameLog],season=${seasonVal()})`);
      const ipNum=v=>{ if(v==null)return 0; const t=String(v).split("."); return parseInt(t[0])+(t[1]?parseInt(t[1])/3:0); };
      const m={};
      (pd.people||[]).forEach(p=>{
        let era=null,whip=null,ipv=null,era3=null,era5=null,ip5=null,starts5=null,bb5=null,k5=null,last1Er=null,last1Ip=null,last2Bad=0,short5=0,er4Last5=0;
        (p.stats||[]).forEach(s=>{
          const type=s.type&&s.type.displayName;
          if(type==="gameLog"){
            const last5=(s.splits||[]).slice(-5);
            starts5=last5.length;
            const er=last5.reduce((x,sp)=>x+(sp.stat.earnedRuns||0),0);
            const ip=last5.reduce((x,sp)=>x+ipNum(sp.stat.inningsPitched),0);
            bb5=last5.reduce((x,sp)=>x+(sp.stat.baseOnBalls||0),0);
            k5=last5.reduce((x,sp)=>x+(sp.stat.strikeOuts||0),0);
            ip5=Math.round(ip*10)/10;
            short5=last5.filter(sp=>ipNum(sp.stat.inningsPitched)<5).length;
            er4Last5=last5.filter(sp=>(sp.stat.earnedRuns||0)>=4).length;
            const last1=last5[last5.length-1];
            if(last1){
              last1Er=last1.stat.earnedRuns||0;
              last1Ip=ipNum(last1.stat.inningsPitched);
            }
            last2Bad=last5.slice(-2).filter(sp=>{
              const spIp=ipNum(sp.stat.inningsPitched);
              const spEr=sp.stat.earnedRuns||0;
              return spEr>=4 || (spIp<5 && spEr>=3);
            }).length;
            if(ip>=1){ era3=er/ip*9; era5=era3; }
          } else { // season
            (s.splits||[]).forEach(sp=>{era=sp.stat.era!=null?parseFloat(sp.stat.era):era; whip=sp.stat.whip!=null?parseFloat(sp.stat.whip):whip; ipv=ipNum(sp.stat.inningsPitched)||ipv;});
          }
        });
        m[p.id]={era,whip,ip:ipv,era3,era5,ip5,starts5,bb5,k5,last1Er,last1Ip,last2Bad,short5,er4Last5};
      });
      out.forEach(g=>{ if(g.awayP)g.awayP.s=m[g.awayP.id]||{}; if(g.homeP)g.homeP.s=m[g.homeP.id]||{}; });
    }catch(e){ /* ERA 없으면 정보 없음으로 표시 */ }
  }
  return out;
}

async function loadGameLogs(season){
  if(gameLogsSeason===season && gameLogs) return gameLogs;
  try{
    const r=await fetch(`data/game_logs_${season}.json`);
    if(!r.ok) return null;
    gameLogs=await r.json(); gameLogsSeason=season; return gameLogs;
  }catch(e){ return null; }
}
// 한 팀의 선택 날짜 이전 누적 스탯 (시즌승률/홈·원정승률/OBP·SLG·BB-K/득실)
function pitTeamStanding(logs, tid, date){
  const tl=(logs.team_logs[tid]||[]).filter(r=>r[0]<date);
  if(!tl.length) return null;
  const wins=tl.filter(r=>r[3]).length, n=tl.length, losses=n-wins;
  const homeR=tl.filter(r=>r[4]), awayR=tl.filter(r=>!r[4]);
  const hw=homeR.filter(r=>r[3]).length, aw=awayR.filter(r=>r[3]).length;
  const rs=tl.reduce((s,r)=>s+r[1],0), ra=tl.reduce((s,r)=>s+r[2],0);
  let obp=null,slg=null,bbk=null;
  const bl=(logs.batting_logs[tid]||[]).filter(r=>r[0]<date);
  if(bl.length>=15){
    const H=bl.reduce((s,r)=>s+r[1],0),BB=bl.reduce((s,r)=>s+r[2],0),HBP=bl.reduce((s,r)=>s+r[3],0);
    const AB=bl.reduce((s,r)=>s+r[4],0),SF=bl.reduce((s,r)=>s+r[5],0);
    const D=bl.reduce((s,r)=>s+r[6],0),T=bl.reduce((s,r)=>s+r[7],0),HR=bl.reduce((s,r)=>s+r[8],0),K=bl.reduce((s,r)=>s+r[9],0);
    obp=(H+BB+HBP)/Math.max(1,AB+BB+HBP+SF);
    slg=(H+D+2*T+3*HR)/Math.max(1,AB);
    bbk=BB/Math.max(1,K);
  }
  return {win:n?wins/n:0, wins, losses, home:homeR.length?hw/homeR.length:null,
    away:awayR.length?aw/awayR.length:null, rs, ra, obp, slg, bbk};
}
// 현재 standings 골격(div 등)에 선택 날짜 이전 스탯을 덮어씀
function applyPITStandings(st, logs, date){
  for(const tid in st){
    const p=pitTeamStanding(logs, tid, date);
    if(!p) continue;
    Object.assign(st[tid], p);
  }
}
// teamGamesCache를 선택 날짜 이전 경기로 구성 (recentRunDiff/recentRuns/sosWin용)
function buildPITTeamGames(logs, date, season){
  for(const tid in logs.team_logs){
    teamGamesCache[tid+"_"+season]=logs.team_logs[tid]
      .filter(r=>r[0]<date)
      .map(r=>({date:r[0], isHome:r[4], opp:r[5], ms:r[1], os:r[2], win:r[3]}));
  }
}
// 선발 투수 스탯을 선택 날짜 이전 등판으로 재계산
function pitPitcherStat(logs, pid, date){
  const rows=(logs.pitcher_logs[String(pid)]||[]).filter(r=>r[0]<date);
  if(!rows.length) return null;
  const year=date.slice(0,4);
  let era=null;
  const seasonRows=rows.filter(r=>r[0].slice(0,4)===year);
  if(seasonRows.length){
    const er=seasonRows.reduce((s,r)=>s+r[1],0), ip=seasonRows.reduce((s,r)=>s+r[2],0);
    if(ip>=1) era=er/ip*9;
  }
  const last5=rows.slice(-5);
  let era3=null,bb5=null,k5=null,ip5=null,last1Er=null,last1Ip=null,last2Bad=0,short5=0,er4Last5=0;
  const er5=last5.reduce((s,r)=>s+r[1],0), ipl=last5.reduce((s,r)=>s+r[2],0);
  bb5=last5.reduce((s,r)=>s+r[3],0); k5=last5.reduce((s,r)=>s+r[4],0);
  ip5=Math.round(ipl*10)/10;
  short5=last5.filter(r=>r[2]<5).length;
  er4Last5=last5.filter(r=>r[1]>=4).length;
  const last1=last5[last5.length-1];
  if(last1){ last1Er=last1[1]; last1Ip=last1[2]; }
  last2Bad=last5.slice(-2).filter(r=>r[1]>=4 || (r[2]<5 && r[1]>=3)).length;
  if(ipl>=1) era3=er5/ipl*9;
  return {era, era3, era5:era3, bb5, k5, ip5, starts5:last5.length, last1Er, last1Ip, last2Bad, short5, er4Last5};
}
function applyPITPitchers(gameList, logs, date){
  for(const g of gameList){
    for(const p of [g.homeP, g.awayP]){
      if(p&&p.id){ const s=pitPitcherStat(logs, p.id, date); if(s) p.s=s; }
    }
  }
}

// 한 팀의 시즌 최근 경기 결과(완료 경기) 가져오기 (캐시)
let teamGamesCache={};
async function fetchTeamGames(teamId,season){
  const key=teamId+"_"+season;
  if(teamGamesCache[key]) return teamGamesCache[key];
  const d=await getJSON(`${API}/schedule?sportId=1&teamId=${teamId}&season=${season}&gameType=R`);
  const all=[];
  (d.dates||[]).forEach(dt=>(dt.games||[]).forEach(g=>{
    if(g.status.detailedState!=="Final") return;
    const isHome=g.teams.home.team.id===teamId;
    const me=isHome?g.teams.home:g.teams.away, opp=isHome?g.teams.away:g.teams.home;
    all.push({date:g.gameDate, isHome, opp:opp.team.id, ms:me.score, os:opp.score, win:me.isWinner===true});
  }));
  teamGamesCache[key]=all;
  return all;
}
// 최근 N경기 평균 득점/실점 (n 없으면 시즌 전체)
function splitAvg(list,n){
  const g=n?list.slice(-n):list;
  if(!g.length) return null;
  const rs=g.reduce((a,x)=>a+x.ms,0)/g.length, ra=g.reduce((a,x)=>a+x.os,0)/g.length;
  return {n:g.length, rs, ra};
}
// 구간별 득실 미니 표 HTML
function splitTableHtml(list){
  const s10=splitAvg(list,10), s20=splitAvg(list,20), sAll=splitAvg(list);
  if(!sAll) return '<div class="rec-empty">완료 경기 없음</div>';
  const row=(label,d)=>{
    if(!d) return "";
    const rsCls=d.rs>sAll.rs+0.3?"good":d.rs<sAll.rs-0.3?"bad":"";
    const raCls=d.ra<sAll.ra-0.3?"good":d.ra>sAll.ra+0.3?"bad":"";
    return `<tr><td>${label}</td><td class="${rsCls}">${d.rs.toFixed(1)}</td><td class="${raCls}">${d.ra.toFixed(1)}</td><td>${(d.rs-d.ra>=0?"+":"")+(d.rs-d.ra).toFixed(1)}</td></tr>`;
  };
  return `<table class="roster"><thead><tr><th>구간</th><th>득점</th><th>실점</th><th>득실</th></tr></thead><tbody>
    ${row("최근 10",s10)}${row("최근 20",s20)}${row("시즌",sAll)}</tbody></table>`;
}

// 오늘 경기 두 팀의 올시즌 맞대결 전적 채우기
async function loadExtras(season){
  h2h={};
  const ids=[...new Set(games.flatMap(g=>[g.away,g.home]))];
  const teamLists={};
  await Promise.all(ids.map(async id=>{ try{ teamLists[id]=await fetchTeamGames(id,season); }catch(e){ teamLists[id]=[]; } }));
  games.forEach(g=>{
    const list=teamLists[g.home]||[];
    let hw=0,aw=0; const meetings=[];
    const gameTimeMs=new Date(g.time).getTime();
    list.forEach(x=>{ if(x.opp===g.away && new Date(x.date).getTime()<gameTimeMs){
      x.win?hw++:aw++;
      // x는 홈팀(g.home) 기준: ms=홈팀 득점, os=원정팀 득점, win=홈팀 승, isHome=g.home이 그 경기 홈이었나
      meetings.push({date:x.date, homeAtHome:x.isHome, hs:x.ms, as:x.os, homeWin:x.win});
    }});
    h2h[g.id]={homeW:hw, awayW:aw, meetings:meetings.slice(-10).reverse()};
  });
}

// 팀 선수 명단 + 스탯 가져오기 (타자/투수 분리)
async function loadRoster(teamId,season){
  if(rosters[teamId]) return rosters[teamId];
  const d=await getJSON(`${API}/teams/${teamId}/roster?rosterType=active&hydrate=person(stats(type=season,season=${season}))`);
  const hitters=[], pitchers=[];
  (d.roster||[]).forEach(p=>{
    const pos=p.position.abbreviation, num=p.jerseyNumber||"", name=p.person.fullName, id=p.person.id;
    let h=null,pi=null;
    (p.person.stats||[]).forEach(s=>{
      const grp=s.group&&s.group.displayName;
      (s.splits||[]).forEach(sp=>{ const st=sp.stat;
        if(grp==="hitting") h={
          avg:st.avg,ops:st.ops,homeRuns:st.homeRuns,rbi:st.rbi,obp:st.obp,slg:st.slg,hits:st.hits,strikeOuts:st.strikeOuts,
          hr:st.homeRuns
        };
        if(grp==="pitching") pi={
          era:st.era,whip:st.whip,gamesStarted:st.gamesStarted,gamesPitched:st.gamesPitched,wins:st.wins,saves:st.saves,
          inningsPitched:st.inningsPitched,strikeOuts:st.strikeOuts,w:st.wins,l:st.losses,so:st.strikeOuts
        };
      });
    });
    if(pos==="P") pitchers.push({id,num,name,pos,s:pi});
    else hitters.push({id,num,name,pos,s:h});
  });
  rosters[teamId]={hitters,pitchers};
  return rosters[teamId];
}

// 모델 승률(투명한 단순식)
function strength(t,where){
  const v = where==="home"?(t.home??t.win):(t.away??t.win);
  const l = t.last10??t.win;
  return 0.5*t.win + 0.3*v + 0.2*l;
}
function modelProb(g){
  const h=standings[g.home], a=standings[g.away];
  if(!h||!a) return null;
  const sH=strength(h,"home"), sA=strength(a,"away");
  let pH=sH/(sH+sA)+0.03; // 홈 어드밴티지
  pH=Math.max(.05,Math.min(.95,pH));
  return {home:pH, away:1-pH};
}

function statClass(v,good,bad,lowerBetter){
  if(v==null) return "";
  v=parseFloat(v); if(isNaN(v)) return "";
  if(lowerBetter) return v<=good?"good":v>=bad?"bad":"";
  return v>=good?"good":v<=bad?"bad":"";
}

async function loadPlayerDetail(playerId,season){
  const key=`${playerId}-${season}`;
  if(playerDetails[key]) return playerDetails[key];
  const d=await getJSON(`${API}/people/${playerId}?hydrate=stats(group=[hitting,pitching],type=[season,gameLog],season=${season})`);
  const p=(d.people||[])[0];
  if(!p) throw new Error("player not found");
  const stats={hitting:null,pitching:null};
  const logs={hitting:[],pitching:[]};
  (p.stats||[]).forEach(s=>{
    const grp=s.group&&s.group.displayName;
    const type=s.type&&s.type.displayName;
    (s.splits||[]).forEach(sp=>{
      if(type==="gameLog"){
        if(grp==="hitting") logs.hitting.push(sp);
        if(grp==="pitching") logs.pitching.push(sp);
      }else{
        if(grp==="hitting") stats.hitting=sp.stat;
        if(grp==="pitching") stats.pitching=sp.stat;
      }
    });
  });
  playerDetails[key]={info:p,stats,logs};
  return playerDetails[key];
}

function inningsNum(v){
  if(v==null||v==="") return 0;
  const s=String(v);
  if(!s.includes(".")) return parseFloat(s)||0;
  const [whole,third]=s.split(".");
  return (parseFloat(whole)||0) + ((parseFloat(third)||0)/3);
}

function rankInRoster(list,statKey,value,lowerBetter,minInnings,selfInnings){
  if(value==null||value==="") return null;
  const v=parseFloat(value); if(isNaN(v)) return null;
  if(minInnings && inningsNum(selfInnings)<minInnings) return {sample:true};
  const source=minInnings ? list.filter(p=>inningsNum(p.s&&p.s.inningsPitched)>=minInnings) : list;
  const vals=source.map(p=>p.s&&p.s[statKey]).filter(x=>x!=null&&x!=="").map(parseFloat).filter(x=>!isNaN(x));
  if(!vals.length) return null;
  const better=lowerBetter ? vals.filter(x=>x<v).length : vals.filter(x=>x>v).length;
  return {rank:better+1,total:vals.length};
}

function playerStatBox(label,value,cls,rank){
  const shown=value==null||value===""?"-":value;
  const rankText=rank&&rank.sample ? "표본부족" : rank ? `${teamLeagueName(current)} ${rank.rank}/${rank.total}위` : "";
  return `<div class="player-stat"><span>${label}</span><b class="${cls||""}">${shown}</b>${rankText?`<small>${rankText}</small>`:""}</div>`;
}

function era5Class(e){ return e==null?"slate":e<=3.00?"good":e<=4.50?"info":e<=6.00?"warn":e<=9.00?"bad":"danger"; }
function era5Label(e){ return e==null?"–":e<=3.00?"최근 좋음":e<=4.50?"최근 보통":e<=6.00?"최근 불안":e<=9.00?"최근 위험":"최근 붕괴"; }
// 소수 이닝(31.33) → 야구 표기(31.1). .1=1아웃(⅓), .2=2아웃(⅔)
function ipFmt(dec){ if(dec==null) return "–"; const w=Math.floor(dec); let o=Math.round((dec-w)*3); if(o>=3) return `${w+1}.0`; return `${w}.${o}`; }
function ip5Label(ip){ return ip==null?"–":ip<10?"표본 작음":ip<20?"최근5 이닝 적음":""; }
function ip5Class(ip){ return ip==null?"slate":ip<10?"bad":ip<20?"warn":"slate"; }
function avgIp5(s){ return s&&s.ip5!=null&&s.starts5>0?s.ip5/s.starts5:null; }
function pitcherStateBadges(s){
  if(!s) return "";
  const e=s.era!=null?Number(s.era):null;
  const e5=s.era5!=null?Number(s.era5):null;
  const starts5=s.starts5!=null?Number(s.starts5):null;
  const ip5=s.ip5!=null?Number(s.ip5):null;
  const avgIp5=(ip5!=null&&starts5>0)?ip5/starts5:null;
  const bb5=s.bb5!=null?Number(s.bb5):null;
  const k5=s.k5!=null?Number(s.k5):null;
  const last1Er=s.last1Er!=null?Number(s.last1Er):null;
  const last1Ip=s.last1Ip!=null?Number(s.last1Ip):null;
  const last2Bad=s.last2Bad!=null?Number(s.last2Bad):0;
  const er4Last5=s.er4Last5!=null?Number(s.er4Last5):0;
  const short5=s.short5!=null?Number(s.short5):0;

  const shortBad = (avgIp5!=null&&avgIp5<5.0) || short5>=3 || (last1Ip!=null&&last1Ip<5&&last1Er!=null&&last1Er>=3);
  const controlBad = bb5!=null&&k5!=null&&k5>0&&bb5/k5>=0.55;
  const seasonBad = e!=null&&e>=5.0;

  const notes=[];
  const add=(cls,txt)=>{ if(!notes.some(n=>n.txt===txt)) notes.push({cls,txt}); };
  if(controlBad) add("warn","볼넷 많음");
  if(shortBad) add("warn","빨리 내려가는 편");
  if(e5!=null&&e!=null&&e5<=3.0&&seasonBad) add("warn","최근은 좋지만 시즌 불안");
  if(!notes.length) return "";
  return `<br>${notes.slice(0,2).map(n=>`<span class="badge ${n.cls}">${n.txt}</span>`).join(" ")}`;
}

function pitcherLine(p, oppTeamId, gameDate, oppLabel){
  if(!p) return "선발 미정";
  const e=p.s&&p.s.era!=null?p.s.era:null;
  const e5=p.s&&p.s.era5!=null?p.s.era5:null;
  const ip5=p.s&&p.s.ip5!=null?p.s.ip5:null;
  let arrowHtml="";
  if(e!=null&&e5!=null&&e>0){
    const ratio=(e5-e)/e;
    const abs=Math.abs(ratio);
    const cnt=abs>=0.3?3:abs>=0.2?2:abs>=0.1?1:0;
    if(cnt>0){
      const arr=ratio<0?"▲":"▼";
      const col=ratio<0?"#e74c3c":"#2980b9";
      arrowHtml=` <span style="color:${col};font-weight:700">${arr.repeat(cnt)}</span>`;
    }
  }
  const starts5=p.s&&p.s.starts5!=null?p.s.starts5:null;
  const avgIp5=(ip5!=null&&starts5>0)?(ip5/starts5):null;
  const seasonEraRisk = e!=null && e>=5.00;
  const combinedRisk  = seasonEraRisk && avgIp5!=null && avgIp5<4.5;
  const eraDisplayBadge = combinedRisk
    ? `<span class="badge danger">⚠ 조기강판 위험</span>`
    : seasonEraRisk
    ? `<span class="badge bad">⚠ 선발 위험</span>`
    : `<span class="badge ${eraClass(e)}">${eraLabel(e)}</span>`;
  const seasonIp=p.s&&p.s.ip!=null?p.s.ip:null;
  const seasonLine=`<span style="font-size:12px;color:#555">시즌 ERA <b>${e!=null?e.toFixed(2):"–"}</b>${seasonIp!=null?` <span style="color:#888">(${ipFmt(seasonIp)}IP)</span>`:""} ${eraDisplayBadge}</span>`;
  const ip5Warn=ip5!=null&&ip5<20?`<span class="badge ${ip5Class(ip5)}">${ipFmt(ip5)}IP · ${ip5Label(ip5)}</span>`:(ip5!=null?`<span style="font-size:11px;color:#888">${ipFmt(ip5)}IP</span>`:"");
  const recentLine=e5!=null?`<br><span style="font-size:12px;color:#555">최근5 ERA <b>${e5.toFixed(2)}</b>${arrowHtml}</span><br><span style="font-size:11px"><span class="badge ${era5Class(e5)}">${era5Label(e5)}</span> ${ip5Warn}</span>`:"";
  const matchupBadge=pitcherMatchupBadge(p.id, oppTeamId, oppLabel);
  const stateBadges=pitcherStateBadges(p.s);
  return `<span style="font-size:14px;font-weight:700">${p.fullName}</span><br>${seasonLine}${recentLine}${stateBadges}${matchupBadge}`;
}

// AI 언더오버 예상: 예상 총득점 계산 (득점력+실점+구장+선발ERA)
function ouPredict(g){
  if(/Postponed|Suspended/.test(g.status)) return null;
  if(!g.awayP||!g.homeP) return null; // 양쪽 선발 다 나온 경기만 예측
  const a=standings[g.away], h=standings[g.home];
  if(!a||!h) return null;
  const aG=a.wins+a.losses, hG=h.wins+h.losses;
  if(!aG||!hG) return null;
  const aO=a.rs/aG, aD=a.ra/aG, hO=h.rs/hG, hD=h.ra/hG;
  let total=(aO+hD)/2 + (hO+aD)/2;          // 양팀 예상 득점 합
  total *= meta(g.home).park/100;            // 홈 구장 성향 보정
  // 선발 ERA 보정 (리그 평균 4.1 기준, 낮으면 점수 줄임)
  const ae=g.awayP&&g.awayP.s&&g.awayP.s.era!=null?g.awayP.s.era:null;
  const he=g.homeP&&g.homeP.s&&g.homeP.s.era!=null?g.homeP.s.era:null;
  const eras=[ae,he].filter(x=>x!=null);
  if(eras.length){ const avg=eras.reduce((x,y)=>x+y,0)/eras.length; total += (avg-4.1)*0.5; }
  total=Math.max(4,Math.min(16,total));
  // 절대 기준 없이 예상 득점량으로 판단 (MLB 평균 합산 ~8.5)
  const v = total>=9.5?["good","점수 많이 나는 경기"]:total>=8.5?["warn","점수 약간 많음"]:total<=7?["info","점수 적게 나는 경기"]:total<=8?["warn","점수 약간 적음"]:["slate","보통"];
  return {total:total.toFixed(1), label:v[1], cls:v[0]};
}
function avgRunsAtVenue(teamId,venueTeamId,n=10){
  const key=teamId+"_"+seasonVal();
  const list=(teamGamesCache[key]||[]).filter(x=>x.isHome ? teamId===venueTeamId : x.opp===venueTeamId).slice(-n);
  if(!list.length) return null;
  return {n:list.length, avg:list.reduce((s,x)=>s+x.ms,0)/list.length};
}
function h2hTotalAvg(g,n=10){
  const r=h2h[g.id];
  if(!r||!r.meetings||!r.meetings.length) return null;
  const rows=r.meetings.slice(0,n);
  return {n:rows.length, avg:rows.reduce((s,x)=>s+x.hs+x.as,0)/rows.length};
}
function totalPredict(g){
  const a=standings[g.away], h=standings[g.home];
  if(!a||!h) return null;
  const ha=avgRunsAtVenue(g.home,g.home,10);
  const aa=avgRunsAtVenue(g.away,g.home,10);
  const hd=recentRunDiff(g.home,10), ad=recentRunDiff(g.away,10);
  const h2=h2hTotalAvg(g,10);
  const venuePart=(ha&&aa)?ha.avg+aa.avg:null;
  const recentPart=(hd&&ad)?((h.rs/(h.wins+h.losses||1)+a.ra/(a.wins+a.losses||1))/2 + (a.rs/(a.wins+a.losses||1)+h.ra/(h.wins+h.losses||1))/2):null;
  const h2hPart=h2?h2.avg:null;
  let total=0, weight=0;
  if(venuePart!=null){ total+=venuePart*.50; weight+=.50; }
  if(recentPart!=null){ total+=recentPart*.35; weight+=.35; }
  if(h2hPart!=null){ total+=h2hPart*.15; weight+=.15; }
  if(!weight) return null;
  total=total/weight;
  total*=meta(g.home).park/100;
  return {total, venuePart, recentPart, h2hPart, venueN:(ha&&aa)?Math.min(ha.n,aa.n):0, h2hN:h2?h2.n:0};
}
function totalInfoHtml(g){

}
function parseGameWeather(box){
  const info={};
  (box&&box.info||[]).forEach(x=>{ if(x&&x.label) info[x.label]=x.value||""; });
  const weather=info.Weather||"", wind=info.Wind||"";
  const tm=/(\d+)\s*degrees/i.exec(weather);
  const wm=/(\d+)\s*mph/i.exec(wind);
  const dm=/mph,\s*(.+?)\.?$/i.exec(wind);
  const tempF=tm?parseInt(tm[1],10):null;
  const tempC=tempF!=null?(tempF-32)*5/9:null;
  const windMph=wm?parseInt(wm[1],10):null;
  const windDir=dm?dm[1].trim():"";
  const dome=/roof closed|dome/i.test(weather);
  return {weather,wind,tempF,tempC,windMph,windDir,dome};
}

  const teams = g ? [g.home,g.away].filter(Boolean) : [];
  const roofType = homeId!=null && BALLPARK_WEATHER[homeId] ? BALLPARK_WEATHER[homeId].roof : null;
  const goodPark = homeId!=null && HOT_TOTAL_PARKS.has(homeId);
  const parkAvg = homeId!=null ? HOT_PARK_AVG[homeId] : null;
  const parkText = parkAvg ? `${meta(homeId).ko} 경기장 더운 날 평균 ${parkAvg.toFixed(2)}점` : "";
  const teamText = g&&HOT_TEAM_AVG[g.home]&&HOT_TEAM_AVG[g.away]
    ? `${meta(g.home).abbr} 더운 날 평균 ${HOT_TEAM_AVG[g.home].toFixed(2)}점 · ${meta(g.away).abbr} 더운 날 평균 ${HOT_TEAM_AVG[g.away].toFixed(2)}점`
    : "";
  const hotTeams = teams.filter(id=>HOT_SCORE_TEAMS.has(id));
  if(wx.tempC!=null){
    if(wx.tempC>=32&&goodPark) notes.push({cls:"bad",txt:"강한 고득점 환경",evidence:"32도 이상 + 점수 잘 나는 경기장"});
    else if(wx.tempC>=27&&goodPark) notes.push({cls:"warn",txt:"고득점 환경",evidence:"더운 날 + 점수 잘 나는 경기장"});
    else if(wx.tempC>=32) notes.push({cls:"bad",txt:"아주 더운 날",evidence:"야외 32도 이상 경기 평균 10.38점"});
    else if(wx.tempC>=27) notes.push({cls:"warn",txt:"더운 날",evidence:"야외 27도 이상 경기 평균 9.40점"});
  }
  if(wx.tempC!=null&&wx.tempC>=27){
    notes.push({cls:"slate",txt:"경기장 더운 날 평균",evidence:parkText||`${homeId?meta(homeId).ko:"이"} 경기장: 자료 부족`});
  }
  if(roofType==="retractable") notes.push({cls:"slate",txt:"개폐식 구장",evidence:""});
  if(wx.tempC!=null&&wx.tempC>=27&&hotTeams.length){
    const names=hotTeams.map(id=>meta(id).ko).join(", ");
    notes.push({cls:"info",txt:"더운 날 점수팀 있음",evidence:`${names} · 더운 날 득점 상승 경향`});
  }
  if(wx.tempC!=null&&wx.tempC>=27&&teamText){
    notes.push({cls:"slate",txt:"양 팀 더운 날 득점",evidence:teamText});
  }
  if(wx.source!=="forecast"&&wx.windMph!=null&&wx.windMph>=8&&wx.windDir){
    const d=wx.windDir.toLowerCase();
    if(d.startsWith("out")) notes.push({cls:"warn",txt:"바깥바람 고득점 보조",evidence:"8mph 이상 바깥쪽 바람 평균 총점 9.17점 · 야외 평균 대비 +0.27점"});
    else if(d.startsWith("in")) notes.push({cls:"slate",txt:"안쪽바람 저득점 보조",evidence:"8mph 이상 안쪽 바람 평균 총점 8.59점 · 야외 평균 대비 -0.31점"});
  }
  const raw=[wx.tempC!=null?`${wx.tempC.toFixed(0)}도`:null, wx.windMph!=null?`${wx.windMph.toFixed?wx.windMph.toFixed(0):wx.windMph}mph${wx.windDir?" "+wx.windDir:""}`:null].filter(Boolean).join(" · ");
  const source=wx.source==="forecast"?"예보 기준":"박스스코어 기록";
  const detail=notes.length
    ? notes.map(n=>`<div class="weather-note"><span class="badge ${n.cls}">${n.txt}</span><span class="weather-evidence">${n.evidence}</span></div>`).join("")
    : `<div class="weather-note"><span class="badge slate">특별한 날씨 신호 없음</span></div>`;
  return `<div class="weather-box">
    <div class="weather-top"><span class="weather-title">날씨 참고</span><span class="weather-raw">${raw||"날씨 정보"}</span><span class="weather-source">${source}</span></div>
    <div class="weather-detail">${detail}</div>
  </div>`;
}
const forecastCache={};
async function getForecastWeather(g){
  const bp=BALLPARK_WEATHER[g.home];
  if(!bp||bp.roof==="dome") return null;
  const key=`${g.home}_${g.time}`;
  if(forecastCache[key]) return forecastCache[key];
  const start=new Date(g.time);
  const ymd=start.toISOString().slice(0,10);
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${bp.lat}&longitude=${bp.lon}&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,precipitation&wind_speed_unit=mph&temperature_unit=fahrenheit&timezone=UTC&start_date=${ymd}&end_date=${ymd}`;
  const d=await getJSON(url);
  const h=d.hourly||{}, times=h.time||[];
  if(!times.length) return null;
  const target=start.getTime();
  let best=0, bestDiff=Infinity;
  times.forEach((t,i)=>{
    const diff=Math.abs(new Date(t+"Z").getTime()-target);
    if(diff<bestDiff){ bestDiff=diff; best=i; }
  });
  const tempF=h.temperature_2m&&h.temperature_2m[best]!=null?Number(h.temperature_2m[best]):null;
  const windMph=h.wind_speed_10m&&h.wind_speed_10m[best]!=null?Number(h.wind_speed_10m[best]):null;
  const deg=h.wind_direction_10m&&h.wind_direction_10m[best]!=null?Number(h.wind_direction_10m[best]):null;
  const precip=h.precipitation&&h.precipitation[best]!=null?Number(h.precipitation[best]):null;
  const wx={
    source:"forecast",
    weather:precip&&precip>0?"예보: 강수 가능":"예보",
    wind:windMph!=null?`${windMph.toFixed(0)} mph`:"",
    tempF,
    tempC:tempF!=null?(tempF-32)*5/9:null,
    windMph,
    windDir:windDirLabel(deg),
    dome:false
  };
  forecastCache[key]=wx;
  return wx;
}
function windDirLabel(deg){
  if(deg==null) return "";
  // Open-Meteo 풍향은 바람이 불어오는 방향이다. 타구 방향 보정은 어려워 보조 정보로만 표시한다.
  const dirs=["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round((((deg%360)+360)%360)/45)%8];
}
async function updateWeatherNotes(){

}
function recentRunDiff(teamId,n=10){
  const key=teamId+"_"+seasonVal();
  const list=teamGamesCache[key]||[];
  const recent=list.slice(-n);
  if(!recent.length) return null;
  const diff=recent.reduce((sum,x)=>sum+(x.ms-x.os),0)/recent.length;
  return {n:recent.length,diff};
}
function recentRuns(teamId,n=10){
  const key=teamId+"_"+seasonVal();
  const list=teamGamesCache[key]||[];
  const recent=list.slice(-n);
  if(!recent.length) return null;
  return recent.reduce((sum,x)=>sum+x.ms,0)/recent.length;
}
function recentWinPct(teamId,n=10){
  const key=teamId+"_"+seasonVal();
  const list=teamGamesCache[key]||[];
  const recent=list.slice(-n);
  if(recent.length<n) return null;  // 스캐너와 동일: 10경기 미만이면 None
  return recent.reduce((sum,x)=>sum+(x.win?1:0),0)/recent.length;
}
// SOS(상대 평균 승률): 그 팀이 만난 상대들의 현재 승률 평균. 빡센 일정이면 높음.
function sosWin(teamId){
  const list=teamGamesCache[teamId+"_"+seasonVal()]||[];
  if(list.length<10) return null;
  let sum=0,c=0;
  for(const x of list){ const o=standings[x.opp]; if(o&&o.win!=null){ sum+=o.win; c++; } }
  return c>=8 ? sum/c : null;
}
// SOS 보정 승률 = 생승률 + (SOS-0.5). 약팀 패딩 거르고 진짜 실력 추정.
function adjWin(teamId){
  const t=standings[teamId]; if(!t||t.win==null) return null;
  const s=sosWin(teamId); if(s==null) return null;
  return t.win+(s-0.5);
}
function venueWin(teamId,isHome){
  const t=standings[teamId];
  if(!t) return null;
  return isHome?t.home:t.away;
}
function venueRecord(teamId,venueTeamId){
  const d=window.TEAM_VENUE_RECORDS||{};
  return d[`${teamId}_${venueTeamId}`]||null;
}
// AI 분석: 한 경기 → 추천 팀·등급·이유
// 메인 신호(검증됨): 홈팀 승률 우위 + 홈팀 최근10 득실 우위 → 2025 63.1%, 2026 61.3%
// 보조 신호: 선발 ERA 차이 1.5+ & 양쪽 30이닝+ → 약 58% (단독 약함)
// (폐기: "3신호 일치 73%"는 2026 한정 과적합으로 판명 — 2025 풀시즌 58%로 무너짐)
// 패턴 매칭: 각 경기를 검증된 과거 패턴에 분류한다(찍어주기 X, 패턴 보여주기 O).
function recommend(g){
  const h=standings[g.home], a=standings[g.away];
  if(!h||!a) return null;
  const mp=modelProb(g);
  // 표본 가드: 시즌 초반(누적 20경기 미만)엔 승률·OPS가 노이즈라 패턴 보류
  const hg=(h.wins||0)+(h.losses||0), ag=(a.wins||0)+(a.losses||0);
  if(Math.min(hg,ag)<20) return P(g.home,"neutral","slate","표본 부족 (시즌 초반)",`양 팀 누적 20경기 미만 → 승률·타선 스탯이 아직 노이즈. 패턴 판정 보류 (홈 ${hg}경기 / 원정 ${ag}경기)`,[],mp);
  const hd=recentRunDiff(g.home,10), ad=recentRunDiff(g.away,10);
  // 기본 신호 판정
  const homeWinEdge = h.win-a.win>=0.08;       // 홈 승률 우위
  const awayWinEdge = a.win-h.win>=0.08;       // 원정 승률 우위
  const homeDiffEdge = hd&&ad&&(hd.diff-ad.diff)>=1.0;  // 홈 최근10 득실 우위
  const awayDiffEdge = hd&&ad&&(ad.diff-hd.diff)>=1.0;  // 원정 최근10 득실 우위
  const batOK = (h.obp!=null&&a.obp!=null&&h.slg!=null&&a.slg!=null&&h.bbk!=null&&a.bbk!=null);
  const homeBat = batOK && h.obp>a.obp && h.slg>a.slg && h.bbk>a.bbk; // 홈 타선질 우위
  const awayBat = batOK && h.obp<a.obp && h.slg<a.slg && h.bbk<a.bbk; // 원정 타선질 우위
  const facts=[];
  if(homeWinEdge) facts.push(`홈 승률 우위 (${pct3(h.win)} vs ${pct3(a.win)})`);
  if(awayWinEdge) facts.push(`원정 승률 우위 (${pct3(a.win)} vs ${pct3(h.win)})`);
  if(homeDiffEdge) facts.push(`홈 최근10 득실 우위 (+${(hd.diff-ad.diff).toFixed(1)}/경기)`);
  if(awayDiffEdge) facts.push(`원정 최근10 득실 우위 (+${(ad.diff-hd.diff).toFixed(1)}/경기)`);
  if(homeBat) facts.push(`홈 타선질 우위 (OBP·SLG·BB/K 모두)`);
  if(awayBat) facts.push(`원정 타선질 우위 (OBP·SLG·BB/K 모두)`);
  const he=g.homeP&&g.homeP.s&&g.homeP.s.era!=null?g.homeP.s.era:null;
  const ae=g.awayP&&g.awayP.s&&g.awayP.s.era!=null?g.awayP.s.era:null;
  const he5=g.homeP&&g.homeP.s&&g.homeP.s.era3!=null?g.homeP.s.era3:null;
  const ae5=g.awayP&&g.awayP.s&&g.awayP.s.era3!=null?g.awayP.s.era3:null;
  // ERA 배지: 최근5 우선, 없으면 시즌 ERA
  const heEra=he5??he, aeEra=ae5??ae;
  if(heEra!=null&&aeEra!=null&&Math.abs(heEra-aeEra)>=0.8){
    const label=heEra<aeEra?"ERA 보강":"ERA 경고";
    const tag=he5!=null?"최근5":"시즌";
    facts.push(`${label}: ${heEra<aeEra?"홈":"원정"} 선발 우위 (홈 ${heEra.toFixed(2)} / 원정 ${aeEra.toFixed(2)}, ${tag})`);
  }

  // 투수×상대팀 상대전적 경고 팩트줄 (약함 신호만, 경고 배지와 동일 기준 IP15+ diff>=1.5)
  const hpvt=g.homeP&&g.homeP.id?(pitcherVsTeam[String(g.homeP.id)]||{})[String(g.away)]:null;
  const apvt=g.awayP&&g.awayP.id?(pitcherVsTeam[String(g.awayP.id)]||{})[String(g.home)]:null;
  if(hpvt&&hpvt.diff>=1.5) facts.push(`원정팀 상대로 약함`);
  if(apvt&&apvt.diff>=1.5) facts.push(`홈팀 상대로 약함`);

  // 상대 선발 흔들림: BB/K≥0.55 + 시즌ERA≥5.0 + 4~8월 (보강 배지만, 단독 추천/감점 금지)
  const dateVal=document.getElementById("dateInput").value;
  const curMo=dateVal?parseInt(dateVal.slice(5,7)):0;
  if(curMo>=4&&curMo<=8){
    const checkControl=(sp)=>{
      if(!sp||!sp.s) return false;
      const spEra=sp.s.era; const bb5=sp.s.bb5; const k5=sp.s.k5;
      return spEra!=null&&spEra>=5.0&&bb5!=null&&k5!=null&&k5>0&&bb5/k5>=0.55;
    };
    // 홈 추천 시 원정 선발, 원정 추천 시 홈 선발이 상대
    const awayControlRisk = checkControl(g.awayP);
    const homeControlRisk = checkControl(g.homeP);
    if(awayControlRisk) facts.push(`원정 선발 불안: 볼넷 많음 + 시즌 실점 높음 (${g.awayP.fullName})`);
    if(homeControlRisk) facts.push(`홈 선발 불안: 볼넷 많음 + 시즌 실점 높음 (${g.homeP.fullName})`);
  }

  // 원정팀 원정 약세: 홈 추천에서 원정팀 원정승률 < 0.38 (검증: 72.0%, n=314, 3시즌 69/78/64%)
  if(a.away!=null && a.away < 0.38){
    facts.push(`원정팀이 원정에서 특히 약함 (원정승률 ${pct3(a.away)})`);
  }

  // ── 4신호 조합 체계 ──
  const homeERAedge = (he5!=null&&ae5!=null) && (ae5-he5>=0.8);  // 홈 선발 최근5 ERA 우위
  const awayERAedge = (he5!=null&&ae5!=null) && (he5-ae5>=0.8);  // 원정 선발 최근5 ERA 우위
  // 원정 강력 ERA 신호 (검증: era5_d<=-2.0 + 승률차 조합 62%)
  const awayERAstrong = (he5!=null&&ae5!=null) && (he5-ae5>=1.8);
  const homeCount = (homeWinEdge?1:0)+(homeDiffEdge?1:0)+(homeBat?1:0)+(homeERAedge?1:0);
  const awayCount = (awayWinEdge?1:0)+(awayDiffEdge?1:0)+(awayBat?1:0)+(awayERAedge?1:0);

  // 최상위: 정예 강력홈 (SOS보정) — SOS보정 승률차 0.20+ & 최근10 득실차 1.0+ & 홈경기 승률 0.55+ (robust 검증 76%, 흔들어도 70%+)
  const haw=adjWin(g.home), aaw=adjWin(g.away);
  const sosElite = haw!=null && aaw!=null && (haw-aaw>=0.20) && hd && ad && (hd.diff-ad.diff>=1.0) && h.home!=null && h.home>=0.55;
  // 선발 위험 감점 규칙 (robust 검증 통과: ⭐⭐⭐⭐홈 -20%p, ⭐홈 -9.6%p)
  // 홈 추천에서만 적용, 시즌ERA 없으면 미적용
  const homeStarterRisk = he!=null && he>=5.00;
  const homeRiskHold=()=>{
    facts.push(`보류: 홈 선발 시즌 ERA ${he.toFixed(2)}로 위험 구간`);
    return P(g.home,"warn","warn","보류","홈 신호는 있으나 선발 위험으로 추천 제외",facts,mp);
  };
  // 홈 선발 불안: 원정 추천에서 홈(상대) 선발 시즌ERA>=4.5 → 보강 배지 (검증 #13: 65.5%, n=238, 3시즌 67/63/67%, 대조군 53.3%)
  const homeStarterShaky = he!=null && he>=4.50;
  // 홈 추천 보강: 홈 선발 최근5 평균 5.5이닝 이상 + 원정 선발 최근5 평균 5.0이닝 미만
  // 검증: 홈 추천 69.0%(n=142), 2024 74 / 2025 68 / 2026 64
  const homeIpAvg=avgIp5(g.homeP&&g.homeP.s);
  const awayIpAvg=avgIp5(g.awayP&&g.awayP.s);
  const homeStarterLengthEdge = homeIpAvg!=null && awayIpAvg!=null && homeIpAvg>=5.5 && awayIpAvg<5.0;
  const addHomeStarterLengthEdge=()=>{ if(homeStarterLengthEdge) facts.push(`홈 선발은 오래 버티고, 원정 선발은 빨리 내려가는 편`); };
  if(sosElite){
    facts.unshift(`SOS보정 전력차 +${(haw-aaw).toFixed(3).replace(/^0/,"")} (상대수준 반영) · 최근10 득실 +${(hd.diff-ad.diff).toFixed(1)} · 홈경기 승률 ${pct3(h.home)}`);
    addHomeStarterLengthEdge();
    if(homeStarterRisk){
      facts.push(`⚠ 선발 위험 강등: 홈 선발 시즌ERA ${he.toFixed(2)} (강추천 → 2단계 하향)`);
      return P(g.home,"win","good","⭐⭐ 홈승","승률 61.7% (선발 위험 강등)",facts,mp,true,0.617);
    }
    return P(g.home,"win","good","⭐⭐⭐⭐ 홈승","승률 80.3%",facts,mp,true,0.803);
  }
  // 압도적 강력홈 — 승률차 0.15+ & 최근10 득실차 2.5+ (검증 75%)
  const crushEdge = (h.win-a.win>=0.15) && hd && ad && (hd.diff-ad.diff>=2.5);
  if(crushEdge){
    facts.unshift(`압도적 격차: 승률 +${(h.win-a.win).toFixed(3).replace(/^0/,"")} · 최근10 득실 +${(hd.diff-ad.diff).toFixed(1)}/경기`);
    addHomeStarterLengthEdge();
    return P(g.home,"win","good","⭐⭐⭐ 홈승","승률 72.8%",facts,mp,true,0.728);
  }
  // 홈: 신호 개수별
  if(homeCount>=4){ addHomeStarterLengthEdge(); return P(g.home,"win","good","⭐⭐ 홈승","승률 61.7%",facts,mp,true,0.617); }
  if(homeCount===3){
    if(homeStarterRisk) return homeRiskHold(); // ⭐홈 + 선발위험 → 추천 제외 (실제 승률 45.9%)
    // 홈 3신호 + 홈경기 강세 → ⭐⭐홈 승격 (검증: n=305, 61.0%, 3시즌 60/65/55%)
    if(h.home!=null && h.home>=0.55){
      facts.unshift(`홈 3신호 + 홈경기 승률 ${pct3(h.home)} (강세 보정)`);
      addHomeStarterLengthEdge();
      return P(g.home,"win","good","⭐⭐ 홈승 · 홈강세","승률 63.4%",facts,mp,true,0.634);
    }
    addHomeStarterLengthEdge();
    return P(g.home,"win","good","참고 홈승","승률 53.5%",facts,mp,false,0.535,true);
  }

function oddsVerdict(gid,wr){

  const odds=parseFloat(v.value);
  const be=1/wr; // 손익분기 배당

  const edge=odds-be;

}
function reasonClass(text){

  if(/원정팀이 원정에서 특히 약함/.test(text)) return "good-signal";
  if(/오래 버티/.test(text)) return "good-signal";  // 선발 이닝 소화력 보강(긍정). "원정" 글자 포함이라 아래 빨강 규칙보다 먼저 잡아야 함

  //   긍정(보강) 문구에 "원정/경고/부족/충돌/패스/약함/착시" 글자가 들어가면, 반드시 이 줄 '위에' good-signal로 따로 등록할 것.

  if(/홈|보강|우위/.test(text)) return "good-signal";
  return "";

function splitEvents(text){
  if(!text) return [];
  return text.split(";").map(x=>x.trim()).filter(Boolean);
}
function countEvents(text){
  return splitEvents(text).length;
}
function summarizeHomers(text){
  const events=splitEvents(text);
  if(!events.length) return null;
  const innings={};
  let totalRuns=0;
  events.forEach(e=>{
    const im=e.match(/(\d+)(?:st|nd|rd|th) inning/i);
    const inning=im?`${im[1]}회`:"몇 회인지 불명";
    const runners=e.match(/,\s*(\d+)\s+on/i);
    const runs=(runners?parseInt(runners[1],10):0)+1;
    totalRuns+=runs;
    if(!innings[inning]) innings[inning]={count:0,runs:0};
    innings[inning].count+=1;
    innings[inning].runs+=runs;
  });
  const parts=Object.entries(innings).map(([inn,v])=>`${inn} 홈런 ${v.count}개로 ${v.runs}점`);
  return `상대가 ${parts.join(", ")}을 냄${totalRuns?` (홈런으로 총 ${totalRuns}점)`: ""}`;
}
function summarizeDoubles(text){

}
function summarizeRisp(text){
  if(!text) return null;
  const m=String(text).match(/(\d+)-for-(\d+)/i);

function summarizeInherited(text){
  if(!text) return null;
  const parts=String(text).split(";").map(x=>x.trim()).filter(Boolean);
  let runners=0, scored=0;
  parts.forEach(p=>{
    const m=p.match(/(\d+)-(\d+)/);
    if(m){ runners+=parseInt(m[1],10); scored+=parseInt(m[2],10); }
  });
  if(!runners) return null;
  return scored>0
    ? `앞 투수가 남긴 주자 ${runners}명 중 ${scored}명이 홈에 들어옴`

}

function scorePlayRuns(play){

  let a=(after.away||0)-(before.away||0);
  if(!h&&!a&&play.result){
    if(play.result.homeScore!=null&&about.homeScoreBefore!=null) h=play.result.homeScore-about.homeScoreBefore;
    if(play.result.awayScore!=null&&about.awayScoreBefore!=null) a=play.result.awayScore-about.awayScoreBefore;
  }
  if(!h&&!a&&play.result&&play.result.rbi!=null){
    const half=about.halfInning;
    if(half==="bottom") h=play.result.rbi;
    if(half==="top") a=play.result.rbi;
  }
  return {home:h, away:a, total:h+a};
}
function scorePlaySummary(play,g){
  const about=play.about||{};

  const isHomeScore=runs.home>0;
  const team=meta(isHomeScore?g.home:g.away).ko;
  const inning=about.inning?`${about.inning}회 ${about.halfInning==="top"?"초":"말"}`:"득점 장면";
  const homeScore=about.endScore&&about.endScore.home!=null?about.endScore.home:(result.homeScore!=null?result.homeScore:null);
  const awayScore=about.endScore&&about.endScore.away!=null?about.endScore.away:(result.awayScore!=null?result.awayScore:null);
  const score=homeScore!=null&&awayScore!=null?`스코어 ${homeScore}-${awayScore}`:"";
  const event=result.event||"득점";
  const batter=matchup.batter&&matchup.batter.fullName?playerNameKo(matchup.batter.fullName):"타자";
  const pitcher=matchup.pitcher&&matchup.pitcher.fullName?playerNameKo(matchup.pitcher.fullName):"투수";
  let action="득점";
  if(/home run/i.test(event)) action=`${batter}가 ${pitcher} 상대로 홈런`;
  else if(/double/i.test(event)) action=`${batter}가 2루타`;
  else if(/single/i.test(event)) action=`${batter}가 안타`;
  else if(/sacrifice/i.test(event)) action=`${batter}의 희생타`;
  else if(/walk/i.test(event)) action=`볼넷으로 점수`;
  else action=`${batter}의 플레이`;

}
function scoringFlowLines(feed,g,r){
  const plays=feed&&feed.liveData&&feed.liveData.plays&&feed.liveData.plays.scoringPlays;

  }
  let verdict=`${mp.ko} 추천이 빗나간 경기.`;

  if(blowLines.length&&oppRuns>=9) verdict=`${mp.ko}가 이길 만한 흐름이었지만, 뒤에 나온 투수가 무너지고 ${mo.ko}가 점수를 많이 내면서 뒤집힌 경기.`;
  if(pickRuns<=3) verdict=`${mp.ko}가 점수를 못 내면서 추천 근거가 깨진 경기.`;
  return `<div class="miss-panel" id="miss-${g.id}">
    <div class="miss-title">사고분석</div>
    <div class="miss-tags">${(tags.length?tags:["세부 원인 확인 필요"]).map(t=>`<span class="badge ${t==="세부 원인 확인 필요"?"slate":"bad"}">${t}</span>`).join(" ")}</div>
    <ul>${lines.map(x=>`<li>${x}</li>`).join("")}</ul>

    <p>${verdict}</p>
  </div>`;
}

function recoCard(g){
  const mh=meta(g.home), ma=meta(g.away), home=`${mh.ko}`, away=`${ma.ko}`;

  // 상태 배지 (종료=적중/빗나감, 진행중=진행 중, 시작전=등급)
  let statusBadge;

    let hit="";

      <div class="reco-pick"><span class="team-badge" style="background:${m.color}">${r?m.abbr:"?"}</span>

      <div class="reco-conf">${statusBadge}</div>

    ${r&&r.reasons?`<div class="reco-reasons">${r.reasons.map(x=>`<span class="reco-reason ${reasonClass(x)}">${x}</span>`).join("")}</div>`:""}

      <div>
        ${showAccident?`<button onclick="toggleGameAnalysis('${g.id}')" style="font-size:12px;padding:4px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;color:var(--muted);font-weight:700">사고분석</button>`:""}
        <button onclick="showTab('gameView');setTimeout(()=>{const el=document.querySelector('#gameList .game-card[data-id=\\'${g.id}\\']');if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('card-highlight');setTimeout(()=>el.classList.remove('card-highlight'),1400);}},100)" style="font-size:12px;padding:4px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;color:var(--muted);font-weight:700">오늘 경기 보기 →</button>

  </div>`;

function saveRecoSnapshot(){
  const date=document.getElementById("dateInput").value||usToday();
  const snapshot={date, saved_at:new Date().toISOString(), games:[]};
  for(const g of games){
    const r=recommend(g);
    const od=betmanOdds[`${g.home}_${g.away}`]||null;
    const o=ouPredict(g);
    const mh=meta(g.home), ma=meta(g.away);
    snapshot.games.push({
      game_id: g.id,
      home: {id:g.home, name:mh.ko, abbr:mh.abbr},
      away: {id:g.away, name:ma.ko, abbr:ma.abbr},
      time: g.time,
      status: g.status,
      recommend: r ? {
        pick_id: r.pickId,
        pick_name: meta(r.pickId).ko,
        tier: r.tierLabel,
        tier_note: r.tierNote||null,
        kind: r.kind||null,
        reasons: r.reasons||[],
        win_rate: r.wr||null,
        neutral: r.neutral||false,
        warn: r.warn||false
      } : null,
      betman_odds: od ? {
        home_odds: od.home||null,
        away_odds: od.away||null,
        ou_line: od.ou_line||null,
        over: od.over||null,
        under: od.under||null
      } : null,
      ai_total: o ? parseFloat(o.total) : null
    });
  }
  const blob=new Blob([JSON.stringify(snapshot,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`${date}_recommendations.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

    games=await loadGames(date);
    // ── PIT 분기 ③ (API 버전에선 이 if 블록 제거) ──
    if(past&&pitLogs){
      applyPITPitchers(games, pitLogs, date);        // 선발 스탯 과거값
      buildPITTeamGames(pitLogs, date, season);      // 최근10/SOS용 경기목록 과거값
    }
    loadBetmanOdds().then(()=>{ renderGames(); renderRecommend(); });
    renderGames();
    loadExtras(season).then(()=>renderGames());  // 과거는 fetchTeamGames가 PIT 캐시를 반환 → 맞대결도 과거기준
  }catch(e){ document.getElementById("gameList").innerHTML='<div class="state err">경기 불러오기 실패: '+e.message+'</div>'; games=[]; }
  updateSummary();
}

document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(btn.dataset.view).classList.add("active");
  if(btn.dataset.view==="patternView") renderRecommend();
}));
document.querySelectorAll(".lg-tab").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".lg-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  selectedLeague=btn.dataset.league;
  renderRank();
  updateSummary();
}));
document.getElementById("reloadBtn").addEventListener("click",reload);
document.getElementById("dateInput").addEventListener("change",reload);
document.getElementById("seasonInput").addEventListener("change",()=>{ clampApiDate(); reload(); });

// API 버전은 조회 날짜를 당일(오늘)로 제한한다.
clampApiDate();
reload();
</script>
</body>
</html>
