<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아침의 나라</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body {
    font-family:'Nanum Myeongjo', serif;
    background:#0a0a0c; color:#e8dcc0;
    display:flex; align-items:center; justify-content:center;
  }

  /* ===== 타이틀 화면 ===== */
  #title {
    position:relative; width:100%; height:100vh;
    background:
      radial-gradient(circle at 70% 40%, rgba(60,40,20,0.4), transparent 60%),
      linear-gradient(160deg, #14110d 0%, #1c1812 40%, #2a1f14 100%);
    background-size:cover; background-position:center;
    overflow:hidden;
  }
  /* 배경 이미지가 있으면 이 클래스가 붙음 */
  #title.has-bg {
    background-image:
      linear-gradient(90deg, rgba(8,8,10,0.75) 0%, rgba(8,8,10,0.4) 22%, rgba(8,8,10,0.05) 45%, rgba(8,8,10,0) 100%),
      linear-gradient(0deg, rgba(8,8,10,0.55) 0%, rgba(8,8,10,0) 30%),
      var(--bg);
  }

  /* 은은한 안개/입자 */
  #title::after {
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 100%, rgba(180,120,50,0.08), transparent 50%);
    pointer-events:none;
  }

  .frame {
    position:absolute; inset:0;
    padding:6vh 5vw;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
  }
  /* 중앙 텍스트 뒤 어두운 후광 (가독성) */
  .frame::before {
    content:''; position:absolute; top:50%; left:50%;
    width:640px; height:620px; transform:translate(-50%,-50%);
    background:radial-gradient(ellipse 50% 50% at 50% 50%, rgba(6,6,9,0.72) 0%, rgba(6,6,9,0.45) 45%, rgba(6,6,9,0) 75%);
    pointer-events:none; z-index:0;
  }
  .logo, .menu { position:relative; z-index:1; }

  /* 제목 */
  .logo {
    margin-bottom:7vh;
    text-align:center;
  }
  .logo h1 {
    font-family:'Nanum Myeongjo', serif;
    font-weight:800; font-size:60px; line-height:1.05;
    letter-spacing:6px; color:#f3e8cc; white-space:nowrap;
    text-shadow:0 0 24px rgba(220,170,90,0.45), 0 2px 6px rgba(0,0,0,0.8);
  }
  .logo .sub {
    margin-top:14px; font-size:16px; letter-spacing:8px;
    color:#e8c88a; font-weight:400;
    border-top:1px solid rgba(201,168,92,0.5);
    padding-top:12px; display:inline-block;
    text-shadow:0 2px 6px rgba(0,0,0,0.9);
  }

  /* 메뉴 */
  .menu { list-style:none; }
  .menu li {
    font-size:24px; letter-spacing:3px; color:#cdbf9e;
    padding:8px 0; cursor:pointer;
    transition:all .18s; position:relative;
    display:flex; align-items:center; justify-content:center; gap:14px;
    text-shadow:0 2px 7px rgba(0,0,0,0.95);
  }
  .menu li .mk {
    color:transparent; font-size:16px; transition:all .18s;
    transform:rotate(45deg); display:inline-block;
    width:10px; height:10px; border:1px solid #5a4b35;
  }
  .menu li:hover, .menu li.sel {
    color:#f6ecd2; letter-spacing:5px;
    text-shadow:0 0 16px rgba(220,170,90,0.5);
  }
  .menu li:hover .mk, .menu li.sel .mk {
    background:#d8a850; border-color:#d8a850;
    box-shadow:0 0 10px rgba(216,168,80,0.8);
  }
  .menu li.disabled {
    color:#4a4338; cursor:default; pointer-events:none;
  }

  .version {
    position:absolute; left:6vw; bottom:4vh;
    font-size:13px; color:#6a5e48; letter-spacing:2px;
  }
  .hint {
    position:absolute; right:4vw; bottom:4vh;
    font-size:12px; color:#6a5e48; letter-spacing:1px;
    font-family:'Gowun Batang',serif;
  }

  /* ===== 모달 (설정/업적/패스워드 등 placeholder) ===== */
  #modal {
    position:absolute; inset:0; display:none;
    align-items:center; justify-content:center;
    background:rgba(5,5,7,0.82); z-index:10;
  }
  #modal.on { display:flex; }
  .box {
    background:#1a1610; border:1px solid #4a3a26; border-radius:8px;
    padding:32px 40px; max-width:420px; width:88%;
    box-shadow:0 0 40px rgba(0,0,0,0.7);
  }
  .box h2 { font-size:22px; color:#c9a85c; letter-spacing:3px; margin-bottom:18px; }
  .box p { font-size:14px; line-height:1.7; color:#b8aa8c; margin-bottom:18px; font-family:'Gowun Batang',serif; }
  .box textarea {
    width:100%; height:70px; background:#0d0a07; color:#c9a85c;
    border:1px solid #4a3a26; border-radius:5px; padding:8px;
    font-family:monospace; font-size:11px; resize:none; margin-bottom:14px;
  }
  .box .btns { display:flex; gap:10px; justify-content:flex-end; }
  .box button {
    background:#3a2e1e; color:#e8dcc0; border:1px solid #5a4632;
    border-radius:5px; padding:9px 18px; font-family:inherit;
    font-size:14px; letter-spacing:2px; cursor:pointer;
  }
  .box button:hover { background:#4a3a26; }

  @media (max-width:600px){
    .logo h1 { font-size:44px; }
    .menu li { font-size:20px; }
    .frame { max-width:100%; }
  }
</style>
</head>
<body>

<div id="title">
  <div class="frame">
    <div class="logo">
      <h1>아침의 나라</h1>
      <span class="sub">조 선 건 국 기</span>
    </div>
    <ul class="menu" id="menu">
      <li data-act="new"><span class="mk"></span>새 게임</li>
      <li data-act="continue" id="mContinue"><span class="mk"></span>이어하기</li>
      <li data-act="password"><span class="mk"></span>패스워드</li>
      <li data-act="record"><span class="mk"></span>인물록</li>
    </ul>
  </div>
  <div class="version" id="ver">v1.0.0  ·  2026.06.05</div>
  <div class="hint">↑↓ 이동 · Enter 선택</div>

  <!-- 모달 -->
  <div id="modal">
    <div class="box" id="modalBox"></div>
  </div>
</div>

<script>
const SAVE_KEY = 'achim_save_v1';

// ===== 배경 이미지 자동 연결 =====
// games/joseon/ 폴더에 title.jpg(또는 .png)를 넣으면 자동으로 배경 적용.
(function loadBg(){
  const candidates = ['title.jpg','title.png','title.webp'];
  let i=0;
  function tryNext(){
    if(i>=candidates.length) return; // 없으면 그라데이션 배경 유지
    const img=new Image();
    img.onload=()=>{
      const t=document.getElementById('title');
      t.style.setProperty('--bg', `url('${candidates[i]}')`);
      t.classList.add('has-bg');
    };
    img.onerror=()=>{ i++; tryNext(); };
    img.src=candidates[i];
  }
  tryNext();
})();

// ===== 이어하기 활성화 여부 =====
if(!localStorage.getItem(SAVE_KEY)){
  document.getElementById('mContinue').classList.add('disabled');
}

// ===== 메뉴 네비게이션 =====
const items = Array.from(document.querySelectorAll('#menu li'));
let sel = 0;
function selectable(idx){ return !items[idx].classList.contains('disabled'); }
function highlight(){
  items.forEach((li,n)=>li.classList.toggle('sel', n===sel));
}
function moveSel(dir){
  let n=sel;
  do { n=(n+dir+items.length)%items.length; } while(!selectable(n) && n!==sel);
  sel=n; highlight();
}
highlight();

items.forEach((li,n)=>{
  li.addEventListener('mouseenter',()=>{ if(selectable(n)){ sel=n; highlight(); }});
  li.addEventListener('click',()=>{ sel=n; activate(); });
});

document.addEventListener('keydown',e=>{
  if(document.getElementById('modal').classList.contains('on')){
    if(e.key==='Escape') closeModal();
    return;
  }
  if(e.key==='ArrowUp'){ e.preventDefault(); moveSel(-1); }
  if(e.key==='ArrowDown'){ e.preventDefault(); moveSel(1); }
  if(e.key==='Enter'){ e.preventDefault(); activate(); }
});

// ===== 메뉴 동작 =====
function activate(){
  const act = items[sel].dataset.act;
  switch(act){
    case 'new': startNewGame(); break;
    case 'continue': continueGame(); break;
    case 'password': openPassword(); break;
    case 'record': openRecord(); break;
    case 'config': openConfig(); break;
    case 'quit': openModal('<h2>나가기</h2><p>브라우저 탭을 닫아 게임을 종료하세요.</p>'+closeBtn()); break;
  }
}

// 아래는 v1 placeholder. 게임 본편(맵/전투)은 다음 버전에서 연결.
function startNewGame(){
  openModal('<h2>새 게임</h2><p>1392년, 동북면.<br>변방의 무장 이성계의 이야기가 곧 시작됩니다.<br><br>(게임 본편은 다음 버전에서 추가됩니다.)</p>'+closeBtn());
}
function continueGame(){
  openModal('<h2>이어하기</h2><p>저장된 군영 기록을 불러옵니다.<br>(게임 본편 연결 예정)</p>'+closeBtn());
}
function openPassword(){
  openModal('<h2>패스워드</h2><p>군영 기록을 문자열로 저장하고, 다른 기기에서 이어서 플레이할 수 있습니다.</p><textarea placeholder="패스워드를 붙여넣으세요"></textarea>'+closeBtn());
}
function openRecord(){
  openModal('<h2>인물록</h2><p>만난 인물과 적장의 정보가 여기 기록됩니다.<br>아직 만난 인물이 없습니다.</p>'+closeBtn());
}
function openConfig(){
  openModal('<h2>설정</h2><p>음향·텍스트 속도 등은 다음 버전에서 추가됩니다.</p>'+closeBtn());
}

function closeBtn(){ return '<div class="btns"><button onclick="closeModal()">닫기</button></div>'; }
function openModal(html){
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){ document.getElementById('modal').classList.remove('on'); }
</script>
</body>
</html>
