<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Puyo Puyo clone made with HTML</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #15171f; color: #e8e8e8;
    font-family: 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 20px; gap: 20px;
  }
  canvas { background: #0c0e14; border: 2px solid #444; border-radius: 6px; display: block; }
  .panel { display: flex; flex-direction: column; gap: 14px; min-width: 130px; }
  .box { background: #0c0e14; border: 1px solid #2a2e3a; border-radius: 6px; padding: 12px; text-align: center; }
  .box h2 { font-size: 12px; letter-spacing: 1px; color: #8a93a6; text-transform: uppercase; margin-bottom: 6px; }
  .box .val { font-size: 26px; font-weight: 700; }
  .keys { font-size: 12px; line-height: 1.9; color: #8a93a6; text-align: left; }
  .keys b { color: #e8e8e8; }
  .title-color-box { width: 220px; padding: 14px; }
  .color-mode { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .color-mode button {
    margin: 0; padding: 12px 0; border-radius: 8px;
    background: #1a1d27; border: 1px solid #2a2e3a;
    box-shadow: none; color: #8a93a6;
    font-size: 16px; font-weight: 800; letter-spacing: 0;
  }
  .color-mode button.active {
    color: #e8e8e8; border-color: #5a9ff0;
    box-shadow: 0 0 12px rgba(74,143,224,0.28);
  }
  .overlay {
    position: fixed; inset: 0; background: rgba(12,14,20,0.9);
    display: none; flex-direction: column; justify-content: center; align-items: center; gap: 18px;
  }
  .overlay h1 { font-size: 30px; }
  .overlay .s { color: #8a93a6; }
  button {
    background: linear-gradient(180deg,#5a9ff0,#3a7fd0); color: #fff; border: none; border-radius: 10px;
    padding: 20px 56px; font-size: 22px; font-weight: 800; cursor: pointer; letter-spacing: 2px;
    box-shadow: 0 6px 20px rgba(74,143,224,0.45); margin-top: 6px;
  }
  button:hover { background: linear-gradient(180deg,#6aafff,#4a8fe0); }
  button:active { transform: translateY(2px); box-shadow: 0 2px 10px rgba(74,143,224,0.4); }
  .logo {
    width: 72px; height: 72px; border: 3px solid #4a8fe0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px; font-weight: 800; color: #4a8fe0;
    box-shadow: 0 0 24px rgba(74,143,224,0.4);
  }
  .game-title { font-size: 22px; letter-spacing: 1px; text-align: center; }
  .guide { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 12px; max-width: 320px; }
  .guide span { background: #1a1d27; border: 1px solid #2a2e3a; border-radius: 8px; padding: 8px 14px; font-size: 15px; color: #c2c8d4; }
  .guide b { color: #5a9ff0; font-weight: 800; }
</style>
</head>
<body>
  <canvas id="board" width="240" height="480"></canvas>
  <div class="panel">
    <div class="box"><h2>점수</h2><div class="val" id="score">0</div></div>
    <div class="box"><h2>최대 연쇄</h2><div class="val" id="chain">0</div></div>
    <div class="box"><h2>다음</h2><canvas id="next" width="80" height="120" style="display:block;margin:0 auto;background:#0c0e14"></canvas></div>
    <div class="box keys">
      <b>← →</b> 이동<br>
      <b>↑</b> 회전<br>
      <b>↓</b> 빠른 낙하
    </div>
  </div>

  <div class="overlay" id="titleScreen" style="display:flex">
    <div class="logo">P</div>
    <h1 class="game-title">A Puyo Puyo clone<br>made with HTML</h1>
    <div class="box title-color-box">
      <h2>난이도</h2>
      <div class="color-mode">
        <button type="button" data-color-count="4">쉬움 (4색)</button>
        <button type="button" data-color-count="5">어려움 (5색)</button>
      </div>
    </div>
    <button onclick="startGame()">게임 시작 ▶</button>
    <div class="guide">
      <span><b>← →</b> 이동</span>
      <span><b>↑</b> 회전</span>
      <span><b>↓</b> 빠른 낙하</span>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <h1>게임 오버</h1>
    <div class="s">점수 <span id="finalScore">0</span></div>
    <button onclick="startGame()">다시 시작</button>
  </div>

<script>
const COLS=6, ROWS=12, SIZE=40;
const ctx=document.getElementById('board').getContext('2d');
const nctx=document.getElementById('next').getContext('2d');

const COLORS=['#e85a5a','#5a8fe8','#5ac26b','#e6c84c','#a05ad9']; // 빨 파 초 노 보라
const COLOR_COUNT_KEY='puyo-v2-color-count';
let grid, pair, nextPair, score, maxChain, over, busy, dropTimer;
let selectedColorCount=loadColorCount();
let activeColorCount=selectedColorCount;
let anims=[]; // 말랑 애니메이션 (squash, pop)

function newGrid(){ return Array.from({length:ROWS},()=>Array(COLS).fill(-1)); }
function loadColorCount(){
  const saved=Number(localStorage.getItem(COLOR_COUNT_KEY));
  return saved===5 ? 5 : 4;
}
function saveColorCount(count){ localStorage.setItem(COLOR_COUNT_KEY,String(count)); }
function randColor(){ return Math.floor(Math.random()*activeColorCount); }
function makePair(){ return { a:randColor(), b:randColor(), x:2, y:0, rot:0 }; }
// rot: 0=b위, 1=b오른, 2=b아래, 3=b왼  (a가 축)

function bPos(p){
  const d=[[0,-1],[1,0],[0,1],[-1,0]][p.rot];
  return { x:p.x+d[0], y:p.y+d[1] };
}
function valid(p){
  const b=bPos(p);
  for(const c of [[p.x,p.y],[b.x,b.y]]){
    if(c[0]<0||c[0]>=COLS||c[1]>=ROWS) return false;
    if(c[1]>=0 && grid[c[1]][c[0]]!==-1) return false;
  }
  return true;
}

function spawn(){
  pair = nextPair || makePair();
  nextPair = makePair();
  drawNext();
  if(!valid(pair)){ gameOver(); }
}

function move(dx){ const p={...pair,x:pair.x+dx}; if(valid(p)){pair.x+=dx;draw();} }
function rotate(){
  let p={...pair,rot:(pair.rot+1)%4};
  if(valid(p)){ pair.rot=p.rot; draw(); return; }
  // 벽 차기: 좌우로 밀어보기
  for(const k of [-1,1]){ const p2={...p,x:p.x+k}; if(valid(p2)){pair.rot=p2.rot;pair.x=p2.x;draw();return;} }
}
function softDrop(){ const p={...pair,y:pair.y+1}; if(valid(p)){pair.y++;draw();} else lockPair(); }

function step(){ const p={...pair,y:pair.y+1}; if(valid(p)){pair.y++;draw();} else lockPair(); }

function lockPair(){
  const b=bPos(pair);
  if(pair.y>=0) grid[pair.y][pair.x]=pair.a;
  if(b.y>=0) grid[b.y][b.x]=pair.b;
  addSquash(pair.x,pair.y); addSquash(b.x,b.y);
  busy=true; clearInterval(dropTimer);
  setTimeout(()=>resolveBoard(1), 160);
}

// 중력: 떠있는 뿌요 떨어뜨리기
function applyGravity(){
  let moved=false;
  for(let c=0;c<COLS;c++){
    let write=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c]!==-1){
        if(write!==r){ grid[write][c]=grid[r][c]; grid[r][c]=-1; moved=true; addSquash(c,write); }
        write--;
      }
    }
  }
  return moved;
}

// 같은 색 4개 이상 그룹 찾아 제거
function clearGroups(){
  const seen=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  let removed=0, anyPop=false;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]===-1||seen[r][c]) continue;
    const color=grid[r][c], stack=[[r,c]], group=[]; seen[r][c]=true;
    while(stack.length){
      const [y,x]=stack.pop(); group.push([y,x]);
      for(const [dy,dx] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const ny=y+dy,nx=x+dx;
        if(ny<0||ny>=ROWS||nx<0||nx>=COLS||seen[ny][nx]) continue;
        if(grid[ny][nx]===color){ seen[ny][nx]=true; stack.push([ny,nx]); }
      }
    }
    if(group.length>=4){
      anyPop=true; removed+=group.length;
      for(const [y,x] of group){ addPop(x,y,COLORS[color]); grid[y][x]=-1; }
    }
  }
  return {anyPop, removed};
}

function resolveBoard(chain){
  applyGravity();
  draw();
  setTimeout(()=>{
    const {anyPop, removed} = clearGroups();
    if(anyPop){
      score += removed*10*chain;
      maxChain = Math.max(maxChain, chain);
      updateUI();
      draw();
      setTimeout(()=>resolveBoard(chain+1), 260); // 연쇄
    } else {
      // 끝: 다음 페어
      busy=false;
      spawn(); draw();
      dropTimer=setInterval(step, 600);
    }
  }, 160);
}

// ===== 말랑 애니메이션 =====
function addSquash(x,y){ anims.push({type:'squash',x,y,t:0,dur:12}); }
function addPop(x,y,color){ anims.push({type:'pop',x,y,color,t:0,dur:16}); }

function puyo(px,py,colorIdx,squash){
  const cx=px*SIZE+SIZE/2, cy=py*SIZE+SIZE/2;
  let rx=SIZE/2-3, ry=SIZE/2-3;
  if(squash){ rx*=1+squash*0.18; ry*=1-squash*0.22; }
  const col=COLORS[colorIdx];
  ctx.save();
  // 몸통
  const g=ctx.createRadialGradient(cx-rx*0.3,cy-ry*0.4,2,cx,cy,rx);
  g.addColorStop(0, lighten(col,50)); g.addColorStop(1, col);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(cx,cy+(squash?squash*4:0),rx,ry,0,0,Math.PI*2); ctx.fill();
  // 하이라이트
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.35,cy-ry*0.4,rx*0.22,ry*0.16,0,0,Math.PI*2); ctx.fill();
  // 눈 2개
  ctx.fillStyle='#fff';
  for(const ex of [-0.28,0.28]){
    ctx.beginPath(); ctx.ellipse(cx+rx*ex,cy-ry*0.05,rx*0.18,ry*0.24,0,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#222';
  for(const ex of [-0.28,0.28]){
    ctx.beginPath(); ctx.arc(cx+rx*ex,cy,rx*0.09,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function lighten(hex,amt){let n=parseInt(hex.slice(1),16);let r=Math.min(255,(n>>16)+amt),g=Math.min(255,((n>>8)&255)+amt),b=Math.min(255,(n&255)+amt);return`rgb(${r},${g},${b})`;}

function draw(){
  ctx.fillStyle='#0c0e14'; ctx.fillRect(0,0,COLS*SIZE,ROWS*SIZE);
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)ctx.strokeRect(c*SIZE,r*SIZE,SIZE,SIZE);
  // 고정 뿌요 (애니메이션 반영)
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]!==-1){
      const sq=anims.find(a=>a.type==='squash'&&a.x===c&&a.y===r);
      puyo(c,r,grid[r][c], sq?Math.sin((1-sq.t/sq.dur)*Math.PI)* (1-sq.t/sq.dur):0);
    }
  }
  // 터짐 이펙트
  for(const a of anims){
    if(a.type==='pop'){
      const k=a.t/a.dur, R=(SIZE/2)*(1+k*0.8);
      ctx.globalAlpha=1-k; ctx.strokeStyle=a.color; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(a.x*SIZE+SIZE/2,a.y*SIZE+SIZE/2,R,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
  // 현재 페어
  if(pair && !busy){
    if(pair.y>=0) puyo(pair.x,pair.y,pair.a,0);
    const b=bPos(pair); if(b.y>=0) puyo(b.x,b.y,pair.b,0);
  }
}

function drawNext(){
  nctx.fillStyle='#0c0e14'; nctx.fillRect(0,0,80,120);
  const sz=40, ox=0, oy=0;
  // b 위, a 아래
  drawMiniPuyo(nctx,40,32,nextPair.b);
  drawMiniPuyo(nctx,40,72,nextPair.a);
}
function drawMiniPuyo(g,cx,cy,colorIdx){
  const col=COLORS[colorIdx], r=16;
  const grad=g.createRadialGradient(cx-5,cy-6,2,cx,cy,r);
  grad.addColorStop(0,lighten(col,50)); grad.addColorStop(1,col);
  g.fillStyle=grad; g.beginPath(); g.arc(cx,cy,r,0,Math.PI*2); g.fill();
  g.fillStyle='#fff';
  for(const ex of [-5,5]){ g.beginPath(); g.ellipse(cx+ex,cy-1,3,4,0,0,Math.PI*2); g.fill(); }
  g.fillStyle='#222';
  for(const ex of [-5,5]){ g.beginPath(); g.arc(cx+ex,cy,1.6,0,Math.PI*2); g.fill(); }
}

function animLoop(){
  requestAnimationFrame(animLoop);
  if(anims.length){
    anims.forEach(a=>a.t++);
    anims=anims.filter(a=>a.t<a.dur);
    draw();
  }
}
requestAnimationFrame(animLoop);

function updateUI(){
  document.getElementById('score').textContent=score;
  document.getElementById('chain').textContent=maxChain;
}
function gameOver(){
  over=true; clearInterval(dropTimer);
  document.getElementById('finalScore').textContent=score;
  document.getElementById('overlay').style.display='flex';
}
function startGame(){
  activeColorCount=selectedColorCount;
  grid=newGrid(); score=0; maxChain=0; over=false; busy=false; nextPair=null; anims=[];
  document.getElementById('overlay').style.display='none';
  document.getElementById('titleScreen').style.display='none';
  updateUI(); spawn(); draw();
  clearInterval(dropTimer); dropTimer=setInterval(step,600);
}

document.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  if(over||busy||!pair) return;
  switch(e.key){
    case'ArrowLeft':move(-1);break;
    case'ArrowRight':move(1);break;
    case'ArrowUp':rotate();break;
    case'ArrowDown':softDrop();break;
  }
});

function setColorCount(count){
  selectedColorCount=count;
  saveColorCount(count);
  updateColorModeUI();
}

function updateColorModeUI(){
  document.querySelectorAll('[data-color-count]').forEach(btn=>{
    btn.classList.toggle('active', Number(btn.dataset.colorCount)===selectedColorCount);
  });
}

document.querySelectorAll('[data-color-count]').forEach(btn=>{
  btn.addEventListener('click',()=>setColorCount(Number(btn.dataset.colorCount)));
});

// 로드 시 빈 보드만
updateColorModeUI();
grid=newGrid();
ctx.fillStyle='#0c0e14'; ctx.fillRect(0,0,COLS*SIZE,ROWS*SIZE);
ctx.strokeStyle='rgba(255,255,255,0.04)';
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)ctx.strokeRect(c*SIZE,r*SIZE,SIZE,SIZE);
</script>
</body>
</html>
