<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신시 : 천손의 후예</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body { user-select:none; -webkit-user-select:none; }
  body {
    font-family:'Nanum Myeongjo', serif;
    background:#070a0c; color:#e8e0cc;
    display:flex; align-items:center; justify-content:center;
  }

  /* ===== 타이틀 화면 ===== */
  #title {
    position:relative; width:100%; height:100vh;
    background:
      radial-gradient(circle at 65% 35%, rgba(80,90,60,0.35), transparent 60%),
      linear-gradient(160deg, #0b1410 0%, #122018 45%, #1a2418 100%);
    background-size:cover; background-position:center;
    overflow:hidden;
  }
  #title.has-bg {
    background-image:
      linear-gradient(90deg, rgba(6,9,10,0.78) 0%, rgba(6,9,10,0.42) 24%, rgba(6,9,10,0.05) 48%, rgba(6,9,10,0) 100%),
      linear-gradient(0deg, rgba(6,9,10,0.6) 0%, rgba(6,9,10,0) 32%),
      var(--bg);
  }
  #title::after {
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 0%, rgba(180,200,140,0.08), transparent 55%);
    pointer-events:none;
  }

  .frame {
    position:absolute; inset:0;
    padding:6vh 5vw;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
  }
  .frame::before {
    content:''; position:absolute; top:50%; left:50%;
    width:660px; height:600px; transform:translate(-50%,-50%);
    background:radial-gradient(ellipse 50% 50% at 50% 50%, rgba(5,8,7,0.7) 0%, rgba(5,8,7,0.4) 45%, rgba(5,8,7,0) 75%);
    pointer-events:none; z-index:0;
  }
  .logo, .menu { position:relative; z-index:1; }

  /* 제목 */
  .logo { margin-bottom:6vh; text-align:center; }
  .logo .kor-top, .logo .hanja {
    font-weight:800; line-height:1; color:#f1e9cf;
    text-shadow:0 0 30px rgba(200,210,120,0.4), 0 2px 8px rgba(0,0,0,0.85);
  }
  .logo .kor-top { display:block; font-size:78px; margin-bottom:14px; }
  .logo .hanja { font-size:39px; }
  .logo .kor {
    margin-top:18px; font-size:19px; letter-spacing:2px;
    color:#d8cf9a; font-weight:400;
    border-top:1px solid rgba(216,207,154,0.45);
    padding-top:13px; display:inline-block;
    text-shadow:0 2px 6px rgba(0,0,0,0.9);
  }

  /* 메뉴 */
  .menu { list-style:none; }
  .menu li {
    font-size:24px; letter-spacing:3px; color:#cfc6a4;
    padding:8px 0; cursor:pointer;
    transition:all .18s; position:relative;
    display:flex; align-items:center; justify-content:center; gap:14px;
    text-shadow:0 2px 7px rgba(0,0,0,0.95);
  }
  .menu li .mk {
    color:transparent; transition:all .18s;
    transform:rotate(45deg); display:inline-block;
    width:10px; height:10px; border:1px solid #5a5b3a;
  }
  .menu li:hover, .menu li.sel {
    color:#f6efce; letter-spacing:5px;
    text-shadow:0 0 16px rgba(200,210,120,0.5);
  }
  .menu li:hover .mk, .menu li.sel .mk {
    background:#c8cf6a; border-color:#c8cf6a;
    box-shadow:0 0 10px rgba(200,207,106,0.8);
  }
  .menu li.disabled { color:#494633; cursor:default; pointer-events:none; }

  .version { position:absolute; left:5vw; bottom:4vh; font-size:13px; color:#6a6848; letter-spacing:2px; }
  .hint { position:absolute; right:4vw; bottom:4vh; font-size:12px; color:#6a6848; letter-spacing:1px; font-family:'Gowun Batang',serif; }

  /* 모달 */
  #modal { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(4,6,6,0.82); z-index:10; }
  #modal.on { display:flex; }
  .box { background:#11160f; border:1px solid #3a4326; border-radius:8px; padding:32px 40px; max-width:420px; width:88%; box-shadow:0 0 40px rgba(0,0,0,0.7); }
  .box h2 { font-size:22px; color:#c8cf8a; letter-spacing:3px; margin-bottom:18px; }
  .box p { font-size:14px; line-height:1.7; color:#b0ac8c; margin-bottom:18px; font-family:'Gowun Batang',serif; }
  .box textarea { width:100%; height:70px; background:#0a0d07; color:#c8cf8a; border:1px solid #3a4326; border-radius:5px; padding:8px; font-family:monospace; font-size:11px; resize:none; margin-bottom:14px; }
  .box .btns { display:flex; gap:10px; justify-content:flex-end; }
  .box button { background:#2e3a1e; color:#e8e0cc; border:1px solid #4a5632; border-radius:5px; padding:9px 18px; font-family:inherit; font-size:14px; letter-spacing:2px; cursor:pointer; }
  .box button:hover { background:#3a4626; }

  @media (max-width:600px){
    .logo .hanja { font-size:52px; }
    .menu li { font-size:20px; }
  }
</style>
</head>
<body>

<div id="title">
  <div class="frame">
    <div class="logo">
      <span class="kor-top">신시</span>
      <div class="hanja">神市</div>
      <span class="kor">천손의 후예</span>
    </div>
    <ul class="menu" id="menu">
      <li data-act="new"><span class="mk"></span>새 게임</li>
      <li data-act="continue" id="mContinue"><span class="mk"></span>이어하기</li>
      <li data-act="password"><span class="mk"></span>패스워드</li>
      <li data-act="codex"><span class="mk"></span>도감</li>
    </ul>
  </div>
  <div class="version" id="ver">v1.0.0  ·  2026.06.06</div>
  <div class="hint">↑↓ 이동 · Enter 선택</div>

  <div id="modal"><div class="box" id="modalBox"></div></div>
</div>

<script>
const SAVE_KEY = 'sinsi_save_v1';

// 배경 이미지 자동 연결 (title.png 를 이 폴더에 넣으면 적용)
(function loadBg(){
  const candidates=['title.png','title.jpg','title.webp']; let i=0;
  (function tryNext(){
    if(i>=candidates.length) return;
    const img=new Image();
    img.onload=()=>{ const t=document.getElementById('title');
      t.style.setProperty('--bg',`url('${candidates[i]}')`); t.classList.add('has-bg'); };
    img.onerror=()=>{ i++; tryNext(); };
    img.src=candidates[i];
  })();
})();

if(!localStorage.getItem(SAVE_KEY)) document.getElementById('mContinue').classList.add('disabled');

const items=Array.from(document.querySelectorAll('#menu li'));
let sel=0;
const selectable=i=>!items[i].classList.contains('disabled');
const highlight=()=>items.forEach((li,n)=>li.classList.toggle('sel',n===sel));
function moveSel(dir){ let n=sel; do{ n=(n+dir+items.length)%items.length; }while(!selectable(n)&&n!==sel); sel=n; highlight(); }
highlight();
items.forEach((li,n)=>{
  li.addEventListener('mouseenter',()=>{ if(selectable(n)){ sel=n; highlight(); }});
  li.addEventListener('click',()=>{ sel=n; activate(); });
});
document.addEventListener('keydown',e=>{
  if(document.getElementById('modal').classList.contains('on')){ if(e.key==='Escape') closeModal(); return; }
  if(e.key==='ArrowUp'){ e.preventDefault(); moveSel(-1); }
  if(e.key==='ArrowDown'){ e.preventDefault(); moveSel(1); }
  if(e.key==='Enter'){ e.preventDefault(); activate(); }
});

function activate(){
  switch(items[sel].dataset.act){
    case 'new': openModal('<h2>새 게임</h2><p>아득한 옛날, 하늘의 아들이 태백산 신단수 아래로 내려왔다.<br>천손의 이야기가 곧 시작됩니다.<br><br>(게임 본편은 다음 버전에서 추가됩니다.)</p>'+closeBtn()); break;
    case 'continue': openModal('<h2>이어하기</h2><p>저장된 기록을 불러옵니다.<br>(게임 본편 연결 예정)</p>'+closeBtn()); break;
    case 'password': openModal('<h2>패스워드</h2><p>진행 기록을 문자열로 저장하고, 다른 기기에서 이어서 플레이할 수 있습니다.</p><textarea placeholder="패스워드를 붙여넣으세요"></textarea>'+closeBtn()); break;
    case 'codex': openModal('<h2>도감</h2><p>만난 영웅과 부족의 정보가 여기 기록됩니다.<br>아직 비어 있습니다.</p>'+closeBtn()); break;
  }
}
function closeBtn(){ return '<div class="btns"><button onclick="closeModal()">닫기</button></div>'; }
function openModal(html){ document.getElementById('modalBox').innerHTML=html; document.getElementById('modal').classList.add('on'); }
function closeModal(){ document.getElementById('modal').classList.remove('on'); }
</script>
</body>
</html>
