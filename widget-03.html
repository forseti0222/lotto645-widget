<body>
<div id="w3">

(function(){
  var byNo={}, picked=[], currentNo=0;

  function ballColor(n){if(n<=10)return'#fbc400';if(n<=20)return'#69c8f2';if(n<=30)return'#ff7272';if(n<=40)return'#aaaaaa';return'#b0d840';}
  function ballClass(n){if(n<=10)return'y';if(n<=20)return'b';if(n<=30)return'r';if(n<=40)return'g';return'grn';}
  function won(v){if(!v)return'-';if(v>=100000000){var uk=Math.floor(v/100000000),man=Math.floor((v%100000000)/10000);return man>0?uk+'억 '+man.toLocaleString('ko-KR')+'만원':uk+'억원';}if(v>=10000)return Math.round(v/10000).toLocaleString('ko-KR')+'만원';return v.toLocaleString('ko-KR')+'원';}

  function buildBallGrid(){
    var grid=document.getElementById('ball-grid');
    grid.innerHTML='';
    for(var i=1;i<=45;i++){
      (function(n){
        var btn=document.createElement('button');
        btn.className='nb '+ballClass(n);
        btn.textContent=n;
        btn.addEventListener('click',function(){togglePick(n,btn);});
        btn.id='nb-'+n;
        grid.appendChild(btn);
      })(i);
    }
  }

  function togglePick(n,btn){
    var idx=picked.indexOf(n);
    if(idx>=0){
      picked.splice(idx,1);
      btn.classList.remove('selected');
    } else {
      if(picked.length>=6) return;
      picked.push(n);
      btn.classList.add('selected');
    }
    updatePickCount();
  }

  function updatePickCount(){
    document.getElementById('pick-count').textContent=picked.length+'/6';
    document.getElementById('check-btn').disabled=(picked.length!==6);
    // 6개 선택 시 미선택 버튼 비활성화
    for(var i=1;i<=45;i++){
      var btn=document.getElementById('nb-'+i);
      if(btn) btn.disabled=(picked.length>=6 && picked.indexOf(i)<0);
    }
  }

  function clearPicks(){
    picked=[];
    for(var i=1;i<=45;i++){
      var btn=document.getElementById('nb-'+i);
      if(btn){btn.classList.remove('selected');btn.disabled=false;}
    }
    updatePickCount();
    document.getElementById('result').className='result hidden';
    document.getElementById('drawn-wrap').className='drawn-wrap hidden';
  }

  function checkWin(){
    var d=byNo[currentNo]; if(!d) return;
    var nums=d.nums, bonus=d.bonus;
    var matchMain=picked.filter(function(n){return nums.indexOf(n)>=0;}).length;
    var matchBonus=picked.indexOf(bonus)>=0;
    var rank=0, prize=0;
    if(matchMain===6){rank=1;prize=d.ranks[0].amt;}
    else if(matchMain===5&&matchBonus){rank=2;prize=d.ranks[1].amt;}
    else if(matchMain===5){rank=3;prize=d.ranks[2].amt;}
    else if(matchMain===4){rank=4;prize=d.ranks[3].amt;}
    else if(matchMain===3){rank=5;prize=d.ranks[4].amt;}

    var res=document.getElementById('result');
    res.className='result '+(rank>0?'rank'+rank:'none');
    if(rank>0){
      res.innerHTML='<div class="result-rank">🎉 '+rank+'등 당첨!</div>'+
        '<div class="result-prize">1인당 당첨금 '+won(prize)+'</div>'+
        '<div class="result-msg">'+matchMain+'개 일치'+(rank===2?' + 보너스':'')+'</div>'+
        '<div class="match-balls">'+
        picked.map(function(n){
          var hit=nums.indexOf(n)>=0;
          var isBonus=(n===bonus&&rank===2);
          var style=hit?'style="background:'+ballColor(n)+'"':'';
          return '<div class="mb '+(hit?'':'dim')+(isBonus?' bonus-ring':'')+'" '+style+'>'+n+'</div>';
        }).join('')+'</div>';
    } else {
      res.innerHTML='<div class="result-rank" style="font-size:20px">😢 미당첨</div>'+
        '<div class="result-msg">'+matchMain+'개 일치'+(matchBonus?' (보너스 일치)':'')+'</div>'+
        '<div class="match-balls">'+
        picked.map(function(n){
          var hit=nums.indexOf(n)>=0;
          var style=hit?'style="background:'+ballColor(n)+'"':'';
          return '<div class="mb '+(hit?'':'dim')+'" '+style+'>'+n+'</div>';
        }).join('')+'</div>';
    }

    // 당첨번호 표시
    var dw=document.getElementById('drawn-wrap');
    dw.className='drawn-wrap';
    var db=document.getElementById('drawn-balls');
    db.innerHTML=nums.map(function(n){
      var hit=picked.indexOf(n)>=0;
      return '<div class="dball '+ballClass(n)+(hit?' hit':'')+'" style="background:'+ballColor(n)+'">'+n+'</div>';
    }).join('')+
    '<span class="dplus">+</span>'+
    '<div class="dball '+ballClass(bonus)+(picked.indexOf(bonus)>=0?' hit':'')+'" style="background:'+ballColor(bonus)+'">'+bonus+'</div>';
  }

  function init(data){
    LOTTO_DATA=data.sort(function(a,b){return b.no-a.no;});
    LOTTO_DATA.forEach(function(d){byNo[d.no]=d;});
    var sel=document.getElementById('round-sel');
    LOTTO_DATA.forEach(function(d){
      var o=document.createElement('option');o.value=d.no;o.textContent=d.no;sel.appendChild(o);
    });
    currentNo=LOTTO_DATA[0].no;
    document.getElementById('round-date').textContent=LOTTO_DATA[0].date+' 추첨';
    sel.addEventListener('change',function(){
      currentNo=+this.value;
      var d=byNo[currentNo];
      document.getElementById('round-date').textContent=d?d.date+' 추첨':'';
      clearPicks();
    });
    buildBallGrid();
    updatePickCount();

    document.getElementById('manual-btn').addEventListener('click',function(){
      var val=document.getElementById('manual-input').value;
      var nums=val.split(/[,\s]+/).map(Number).filter(function(n){return n>=1&&n<=45;});
      if(nums.length!==6){alert('1~45 사이 숫자 6개를 입력해주세요.');return;}
      if(new Set(nums).size!==6){alert('중복된 번호가 있습니다.');return;}
      clearPicks();
      nums.forEach(function(n){
        picked.push(n);
        var btn=document.getElementById('nb-'+n);
        if(btn) btn.classList.add('selected');
      });
      updatePickCount();
      document.getElementById('manual-input').value='';
    });

    document.getElementById('check-btn').addEventListener('click',checkWin);
  }

  init(LOTTO_DATA);
})();
</script>
