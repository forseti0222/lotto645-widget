<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>당첨 판매점 통계</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f7;display:flex;justify-content:center;padding:16px 16px 32px;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;}
#w9{max-width:520px;width:100%;color:#1a1a2e;}
#w9 *{box-sizing:border-box;}

.head{background:linear-gradient(135deg,#1a1a2e 0%,#2d2d52 100%);border-radius:18px 18px 0 0;padding:20px 24px 18px;color:#fff;}
.badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:2px;color:#ffd84d;border:1px solid rgba(255,216,77,.5);border-radius:20px;padding:3px 12px;margin-bottom:8px;}
.title{font-size:21px;font-weight:800;letter-spacing:-.4px;}
.subtitle{font-size:13px;color:rgba(255,255,255,.65);margin-top:4px;}

.controls{background:#14142a;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.search-wrap{display:flex;gap:8px;}
.search-input{flex:1;padding:8px 14px;border:none;border-radius:10px;font-size:14px;background:#fff;color:#1a1a2e;}
.region-wrap{display:flex;gap:6px;flex-wrap:wrap;}
.region-btn{padding:6px 12px;border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);color:#fff;transition:background .15s;}
.region-btn.active{background:#fbc400;color:#1a1a2e;}

.body{background:#fff;border:1px solid #ececf1;border-top:none;border-radius:0 0 18px 18px;overflow:hidden;}

.summary{padding:10px 16px;background:#f8f8fc;border-bottom:1px solid #ececf1;font-size:12px;color:#6b6b7b;font-weight:600;}

.store-list{padding:0 16px 8px;}
.store-item{padding:12px 0;border-bottom:1px solid #f0f0f5;display:flex;align-items:flex-start;gap:10px;}
.store-item:last-child{border-bottom:none;}
.store-no{min-width:28px;font-size:12px;font-weight:800;color:#aaa;padding-top:2px;text-align:center;}
.store-no.top{color:#fbc400;}
.store-info{flex:1;min-width:0;}
.store-name{font-size:14px;font-weight:800;color:#1a1a2e;margin-bottom:2px;}
.store-addr{font-size:12px;color:#6b6b7b;margin-bottom:4px;}
.store-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge-cnt{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;}
.badge-1{background:#fff3cd;color:#9a6b00;}
.badge-2{background:#e9f0ff;color:#3355cc;}
.badge-last{background:#f0f0f5;color:#6b6b7b;}
.badge-type{background:#f0f0f5;color:#6b6b7b;}

.pagination{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 0 8px;}
.pg-btn{width:36px;height:36px;border:none;border-radius:50%;background:#f0f0f5;color:#1a1a2e;font-size:20px;cursor:pointer;}
.pg-btn:disabled{opacity:.3;cursor:default;}
.pg-info{font-size:13px;font-weight:700;color:#6b6b7b;}

.msg{padding:32px 16px;text-align:center;color:#aaa;font-size:14px;}

.links{padding:16px;border-top:1px solid #ececf1;}
.links-label{font-size:11px;color:#aaa;font-weight:600;margin-bottom:8px;text-align:center;}
.links-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.link-btn{display:block;padding:11px;border:1px solid #e0e0e8;border-radius:10px;font-size:12px;font-weight:700;color:#444;text-decoration:none;text-align:center;background:#fafafa;}
</style>
</head>
<body>
<div id="w9">
  <div class="head">
    <span class="badge">LOTTO 6/45</span>
    <div class="title">1등 배출 판매점 통계</div>
    <div class="subtitle">역대 1등이 많이 나온 판매점을 확인하세요</div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <input class="search-input" id="search" type="text" placeholder="판매점명 또는 주소 검색">
    </div>
    <div class="region-wrap" id="region-wrap">
      <button class="region-btn active" data-region="">전체</button>
    </div>
  </div>

  <div class="body">
    <div id="summary" class="summary"></div>
    <div id="store-list" class="store-list">
      <div class="msg">데이터를 불러오는 중...</div>
    </div>
    <div class="links">
      <div class="links-label">LOTTO ARCHIVE 다른 글도 확인해보세요</div>
      <div class="links-grid">
        <a href="https://archivebox.tistory.com/1" target="_blank" class="link-btn">회차별 당첨번호 조회</a>
        <a href="https://archivebox.tistory.com/3" target="_blank" class="link-btn">내 번호 당첨 확인</a>
      </div>
    </div>
  </div>
</div>

<script>
const STATS_URL = 'https://forseti0222.github.io/lotto645-widget/store_stats.json';
const PAGE_SIZE = 15;
let allData = [];
let filtered = [];
let currentPage = 1;
let currentRegion = '';
let searchTimer = null;

function typeLabel(code) {
  if (code === 'M') return '수동';
  if (code === 'Q') return '자동';
  if (code === 'B') return '반자동';
  return code || '';
}

function getRegion(addr) {
  if (!addr) return '';
  return addr.split(' ')[0] || '';
}

function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  filtered = allData.filter(s => {
    const regionMatch = !currentRegion || getRegion(s.addr) === currentRegion;
    const searchMatch = !q || s.name.toLowerCase().includes(q) || (s.addr||'').toLowerCase().includes(q);
    return regionMatch && searchMatch && s.cnt1 > 0;
  });
  currentPage = 1;
  render();
}

function render() {
  const el = document.getElementById('store-list');
  const summary = document.getElementById('summary');
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  currentPage = Math.min(currentPage, Math.max(1, totalPages));
  const paged = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  const offset = (currentPage - 1) * PAGE_SIZE;

  summary.textContent = `1등 배출 판매점 ${filtered.length}개`;

  if (!paged.length) {
    el.innerHTML = '<div class="msg">해당 조건의 판매점이 없습니다.</div>';
    return;
  }

  const items = paged.map((s, i) => {
    const rank = offset + i + 1;
    const tl = typeLabel(s.type);
    return `
    <div class="store-item">
      <div class="store-no ${rank <= 3 ? 'top' : ''}">${rank}</div>
      <div class="store-info">
        <div class="store-name">${s.name}</div>
        <div class="store-addr">${s.addr || ''}</div>
        <div class="store-badges">
          <span class="badge-cnt badge-1">1등 ${s.cnt1}회</span>
          ${s.cnt2 > 0 ? `<span class="badge-cnt badge-2">2등 ${s.cnt2}회</span>` : ''}
          <span class="badge-cnt badge-last">${s.last}회차</span>
          ${tl ? `<span class="badge-cnt badge-type">${tl}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  const pagination = totalPages > 1 ? `
    <div class="pagination">
      <button class="pg-btn" onclick="changePage(-1)" ${currentPage===1?'disabled':''}>&#x2039;</button>
      <span class="pg-info">${currentPage} / ${totalPages}</span>
      <button class="pg-btn" onclick="changePage(1)" ${currentPage===totalPages?'disabled':''}>&#x203a;</button>
    </div>` : '';

  el.innerHTML = items + pagination;
}

function changePage(dir) {
  currentPage += dir;
  render();
  document.getElementById('store-list').scrollIntoView({behavior:'smooth', block:'start'});
}

function buildRegionBtns() {
  const regions = [...new Set(allData.filter(s=>s.cnt1>0).map(s=>getRegion(s.addr)).filter(Boolean))].sort();
  const wrap = document.getElementById('region-wrap');
  regions.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'region-btn';
    btn.dataset.region = r;
    btn.textContent = r;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentRegion = r;
      applyFilter();
    });
    wrap.appendChild(btn);
  });
  wrap.querySelector('[data-region=""]').addEventListener('click', () => {
    document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
    wrap.querySelector('[data-region=""]').classList.add('active');
    currentRegion = '';
    applyFilter();
  });
}

document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 300);
});

async function init() {
  try {
    const res = await fetch(STATS_URL + '?t=' + Date.now());
    allData = await res.json();
    buildRegionBtns();
    applyFilter();
  } catch {
    document.getElementById('store-list').innerHTML = '<div class="msg">데이터를 불러올 수 없습니다.<br>잠시 후 다시 시도해주세요.</div>';
  }
}

init();
</script>
</body>
</html>
